<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Registration | Care Without Borders</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .register-container {
      display: flex;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
    }

    .register-card {
      width: 100%;
      max-width: 500px;
      margin: auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }

    .register-card h1 {
      color: #0f766e;
      margin-bottom: 10px;
      text-align: center;
      font-size: 28px;
    }

    .register-card p {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
    }

    .password-field {
      position: relative;
    }

    .password-field .toggle-eye {
      position: absolute;
      right: 12px;
      top: 38px;
      cursor: pointer;
      color: #999;
    }

    .btn-register {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
    }

    .btn-register:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: #999;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .divider span {
      padding: 0 10px;
    }

    .google-btn {
      width: 100%;
      padding: 12px;
      background: white;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .google-btn:hover {
      background: #f9f9f9;
      border-color: #0f766e;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
    }

    .google-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .footer-text a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
    }

    .alert.error {
      background: #fee;
      color: #c33;
      border-left: 4px solid #c33;
      display: block;
    }

    .alert.success {
      background: #efe;
      color: #3c3;
      border-left: 4px solid #3c3;
      display: block;
    }

    .password-hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      .register-card {
        padding: 25px;
      }

      .register-card h1 {
        font-size: 24px;
      }

      .form-group {
        margin-bottom: 15px;
      }
    }
  </style>
</head>
<body>

<div class="register-container">
  <div class="register-card">
    <h1>❤️ Create Account</h1>
    <p>Join Care Without Borders</p>

    <!-- Alert Messages -->
    <div id="alertBox" class="alert"></div>

    <!-- Registration Form -->
    <form id="registerForm" onsubmit="handleRegistration(event)">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group password-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" required>
        <span class="toggle-eye" onclick="togglePasswordVisibility('password')">👁</span>
        <div class="password-hint">At least 6 characters</div>
      </div>

      <div class="form-group password-field">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required>
        <span class="toggle-eye" onclick="togglePasswordVisibility('confirmPassword')">👁</span>
      </div>

      <button type="submit" class="btn-register" id="registerBtn">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>OR</span>
    </div>

    <!-- Google Registration -->
    <button type="button" class="google-btn" id="googleRegisterBtn" onclick="handleGoogleRegister(event)">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#4285F4" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign Up with Google
    </button>

    <!-- Footer Links -->
    <div class="footer-text">
      Already have an account? <a href="login.html">Login</a><br>
      <a href="index.html">← Back to Home</a>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db, googleProvider, googleSignIn } from './js/firebase.js';
  import { 
    createUserWithEmailAndPassword,
    updateProfile,
    setPersistence,
    browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { 
    doc, 
    setDoc 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Set Firebase persistence
  setPersistence(auth, browserLocalPersistence);

  window.togglePasswordVisibility = function(fieldId) {
    const field = document.getElementById(fieldId);
    const toggleEye = event.target;
    if (field.type === 'password') {
      field.type = 'text';
      toggleEye.textContent = '👁‍🗨';
    } else {
      field.type = 'password';
      toggleEye.textContent = '👁';
    }
  };

  function showAlert(message, type = 'error') {
    const alertBox = document.getElementById('alertBox');
    const icon = type === 'error' ? '❌' : '✅';
    alertBox.className = `alert ${type}`;
    alertBox.innerHTML = `<i class="fas fa-${type === 'error' ? 'times-circle' : 'check-circle'}"></i> ${message}`;
    
    if (type === 'success') {
      setTimeout(() => {
        alertBox.style.display = 'none';
      }, 2000);
    }
  }

  // Email/Password Registration
  window.handleRegistration = async function(event) {
    event.preventDefault();
    
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const registerBtn = document.getElementById('registerBtn');

    // Validation
    if (!name || !email || !password || !confirmPassword) {
      showAlert('Please fill in all fields', 'error');
      return;
    }

    if (password.length < 6) {
      showAlert('Password must be at least 6 characters', 'error');
      return;
    }

    if (password !== confirmPassword) {
      showAlert('Passwords do not match', 'error');
      return;
    }

    try {
      registerBtn.disabled = true;
      registerBtn.textContent = '🔄 Creating account...';

      // Create Firebase user
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // Update profile with display name
      await updateProfile(user, { displayName: name });

      // Create Firestore record
      await setDoc(doc(db, "users", user.uid), {
        email: email,
        name: name,
        role: "patient",
        createdAt: new Date()
      });

      showAlert('✅ Account created successfully! Redirecting to login...', 'success');
      
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);

    } catch (error) {
      console.error('Registration error:', error);
      
      if (error.code === 'auth/email-already-in-use') {
        showAlert('Email already registered. Please login or use a different email.', 'error');
      } else if (error.code === 'auth/weak-password') {
        showAlert('Password is too weak. Please use a stronger password.', 'error');
      } else if (error.code === 'auth/invalid-email') {
        showAlert('Invalid email format.', 'error');
      } else {
        showAlert(`Registration failed: ${error.message}`, 'error');
      }
      
      registerBtn.disabled = false;
      registerBtn.textContent = '👤 Create Account';
    }
  };

  // Google Registration
  window.handleGoogleRegister = async function(event) {
    event.preventDefault();
    
    const googleBtn = document.getElementById('googleRegisterBtn');
    
    try {
      googleBtn.disabled = true;
      googleBtn.textContent = '🔄 Connecting with Google...';

      googleProvider.setCustomParameters({ 'prompt': 'select_account' });
      
      const result = await googleSignIn(auth, googleProvider);
      const user = result.user;

      // Create Firestore record
      await setDoc(doc(db, "users", user.uid), {
        email: user.email,
        name: user.displayName || user.email.split('@')[0],
        role: "patient",
        photoURL: user.photoURL || "",
        loginMethod: "Google",
        createdAt: new Date()
      });

      showAlert(`✅ Account created! Welcome ${user.displayName}!`, 'success');
      
      setTimeout(() => {
        window.location.href = 'patient.html';
      }, 1500);

    } catch (error) {
      console.error('Google Registration Error:', error);
      
      if (error.code === 'auth/popup-closed-by-user') {
        googleBtn.disabled = false;
        googleBtn.textContent = 'Sign Up with Google';
        return;
      }
      
      if (error.code === 'auth/account-exists-with-different-credential') {
        showAlert('Email already registered. Please login instead.', 'error');
      } else if (error.code === 'auth/unauthorized-domain') {
        showAlert('⚠️ Unauthorized domain. Add this URL to Firebase.', 'error');
      } else {
        showAlert(`Google Registration Error: ${error.message}`, 'error');
      }
      
      googleBtn.disabled = false;
      googleBtn.textContent = 'Sign Up with Google';
    }
  };
</script>

</body>
</html>

  <!-- LEFT IMAGE PANEL -->
  <div class="left-panel">
    <img src="images/near.jpg" alt="Healthcare">

    <div class="overlay-text">
      <h1>Join Care Without Borders</h1>
      <p>Start your journey towards better healthcare.</p>
    </div>
  </div>

  <!-- RIGHT FORM PANEL -->
  <div class="right-panel">
    <div class="auth-card">
      <h2>Create Account</h2>

      <form id="registerForm">

        <div class="floating-input">
          <input type="text" id="name" required placeholder=" ">
          <label>Full Name</label>
        </div>

        <div class="floating-input">
          <input type="email" id="email" required placeholder=" ">
          <label>Email</label>
        </div>

        <div class="floating-input password-field">
          <input type="password" id="password" required placeholder=" ">
          <label>Password</label>
          <span id="togglePassword" style="cursor: pointer;">👁</span>
        </div>

        <div class="floating-input password-field">
          <input type="password" id="confirmPassword" required placeholder=" ">
          <label>Confirm Password</label>
          <span id="toggleConfirm" style="cursor: pointer;">👁</span>
        </div>

        <button type="submit" class="btn-solid large">Create Account</button>

      </form>

      <p class="bottom-text">
        Already have an account? <a href="login.html">Login</a> | <a href="index.html">Back to Home</a>
      </p>

    </div>
  </div>

</div>

</body>
</html>
