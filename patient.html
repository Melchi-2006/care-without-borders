<!DOCTYPE html>
<html>
<head>
  <title>Patient Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <h1>Care Without Borders - Patient</h1>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- Appointment -->
  <div class="card">
    <h2>Book Appointment</h2>
    <input type="date" id="appointmentDate">
    <button id="bookBtn">Book</button>
  </div>

  <!-- Video Call -->
  <div class="card">
    <h2>Instant Video Consultation</h2>
    <input type="text" id="roomName" placeholder="Enter Room Name">
    <button onclick="startCall()">Start Call</button>
    <div id="jitsiContainer" style="margin-top:10px;"></div>
  </div>
<h2>AI Medical Chatbot</h2>

<div class="chat-container">
  <div id="chatMessages"></div>

  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="Ask your medical question..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script src="js/patient.js"></script>
  <!-- Chatbot -->
  <div class="card">
    <h2>Medical Chatbot</h2>
    <input type="text" id="chatInput" placeholder="Describe symptoms...">
    <button onclick="chatBot()">Ask</button>
    <p id="chatResponse"></p>
  </div>

  <!-- Map -->
  <div class="card">
    <h2>Nearby Hospitals</h2>
    <iframe
      width="100%"
      height="300"
      src="https://www.openstreetmap.org/export/embed.html">
    </iframe>
  </div>

  <!-- EHR -->
  <div class="card">
    <h2>Your Medical Records</h2>
    <p>No records yet.</p>
  </div>

  <!-- Disease Graph -->
  <div class="card">
    <h2>Disease Spread Graph</h2>
    <canvas id="diseaseChart"></canvas>
  </div>

</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script type="module" src="js/patient.js"></script>
</body>
</html>
