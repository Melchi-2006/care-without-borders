<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Portal - Care Without Borders</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 50%, #06b6d4 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      color: white;
      padding: 20px;
      max-width: 600px;
    }

    .logo {
      font-size: 80px;
      margin-bottom: 30px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      font-size: 42px;
      margin-bottom: 15px;
      font-weight: 800;
    }

    p {
      font-size: 18px;
      opacity: 0.95;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 20px 30px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 2px solid white;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: white;
      color: #0f766e;
      border-color: white;
      grid-column: span 2;
      font-size: 18px;
      padding: 25px 40px;
    }

    .btn-primary:hover {
      background: #f0f0f0;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .loading {
      font-size: 16px;
      opacity: 0.9;
      margin-top: 30px;
    }

    .loading span {
      display: inline-block;
      animation: pulse 1.5s infinite;
    }

    .loading span:nth-child(1) { animation-delay: 0s; }
    .loading span:nth-child(2) { animation-delay: 0.2s; }
    .loading span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">🏥</div>
  <h1>Patient Portal</h1>
  <p>Welcome to your healthcare journey with Care Without Borders</p>

  <div class="button-group">
    <a href="login.html" class="btn">🔐 Sign In</a>
    <a href="register.html" class="btn">✨ Sign Up</a>
    <a href="welcome-flow.html?role=patient" class="btn btn-primary">→ Get Started With Welcome Guide</a>
  </div>

  <div class="loading">
    <span>.</span><span>.</span><span>.</span>
  </div>
</div>

<script>
  // Auto-redirect if user is already logged in
  window.addEventListener('load', function() {
    const isAuthenticated = localStorage.getItem('firebaseUserUID') || sessionStorage.getItem('firebaseUserUID');
    
    if (isAuthenticated) {
      // User is logged in, redirect to dashboard
      window.location.href = 'patient.html';
    } else if (typeof firebase !== 'undefined') {
      // Check Firebase auth
      firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
          // User is authenticated, go to patient dashboard
          window.location.href = 'patient.html';
        }
      });
    }
  });
</script>

</body>
</html>
