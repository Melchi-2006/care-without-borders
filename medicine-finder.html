<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medicine Finder | Care Without Borders</title>
  <!-- Multilingual Support - Load First! -->
  <script src="js/i18n.js"></script>
  <!-- Audio System -->
  <script src="js/audio.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: white;
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 30px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      color: #0f766e;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .header p {
      color: #666;
      font-size: 16px;
      margin-bottom: 20px;
    }

    /* Search Section */
    .search-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .search-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    .search-card h2 {
      color: #0f766e;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
    }

    .search-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.3s ease;
      margin-bottom: 10px;
    }

    .search-input:focus {
      outline: none;
      border-color: #0f766e;
      box-shadow: 0 0 10px rgba(15, 118, 110, 0.2);
    }

    .search-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(15, 118, 110, 0.3);
    }

    .search-btn:active {
      transform: translateY(0);
    }

    /* Results Section */
    .results-section {
      display: grid;
      gap: 20px;
    }

    .result-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 15px;
      border-bottom: 2px solid #0f766e;
      padding-bottom: 15px;
    }

    .result-title {
      flex: 1;
    }

    .result-title h3 {
      color: #0f766e;
      font-size: 22px;
      margin-bottom: 5px;
    }

    .result-title p {
      color: #666;
      font-size: 13px;
    }

    .severity-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .severity-mild {
      background: #c8e6c9;
      color: #2e7d32;
    }

    .severity-moderate {
      background: #ffe082;
      color: #f57f17;
    }

    .severity-severe {
      background: #ffccbc;
      color: #d84315;
    }

    .severity-critical {
      background: #ef9a9a;
      color: #c62828;
    }

    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .info-item {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #0f766e;
    }

    .info-label {
      color: #0f766e;
      font-weight: bold;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .info-value {
      color: #333;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Medicines List */
    .medicines-section {
      margin-top: 20px;
    }

    .medicines-section h4 {
      color: #0f766e;
      margin-bottom: 15px;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .medicine-item {
      background: #f9f9f9;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 8px;
      border-left: 4px solid #14b8a6;
      transition: all 0.3s ease;
    }

    .medicine-item:hover {
      background: #f0f0f0;
      transform: translateX(5px);
    }

    .medicine-name {
      font-weight: bold;
      color: #0f766e;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .medicine-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      font-size: 13px;
      color: #666;
    }

    /* Summary Box */
    .summary-box {
      background: #e8f5f4;
      border-left: 4px solid #0f766e;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      color: #0f766e;
      font-size: 13px;
      line-height: 1.6;
    }

    .warning-box {
      background: #fff3e0;
      border-left: 4px solid #f57c00;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      color: #e65100;
      font-size: 13px;
      line-height: 1.6;
    }

    .emergency-box {
      background: #ffebee;
      border-left: 4px solid #c62828;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      color: #c62828;
      font-size: 13px;
      line-height: 1.6;
      font-weight: bold;
    }

    /* Tab System */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
    }

    .tab-btn {
      padding: 12px 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: #666;
      font-size: 14px;
      font-weight: bold;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      position: relative;
      bottom: -2px;
    }

    .tab-btn.active {
      color: #0f766e;
      border-bottom-color: #0f766e;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Filter Tags */
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .filter-tag {
      background: #e8f5f4;
      color: #0f766e;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s ease;
      font-size: 13px;
    }

    .filter-tag:hover {
      border-color: #0f766e;
    }

    .filter-tag.active {
      background: #0f766e;
      color: white;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state h3 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #666;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .search-section {
        grid-template-columns: 1fr;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 24px;
      }

      .result-header {
        flex-direction: column;
        gap: 10px;
      }

      .tabs {
        flex-wrap: wrap;
      }

      .tab-btn {
        padding: 10px 15px;
        font-size: 13px;
      }
    }

    /* Comparison Feature */
    .comparison-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .comparison-item {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      border: 2px solid #ddd;
    }

    .comparison-item h4 {
      color: #0f766e;
      margin-bottom: 10px;
    }

    .comparison-item ul {
      list-style: none;
      font-size: 13px;
      color: #666;
    }

    .comparison-item li {
      padding: 5px 0;
      padding-left: 20px;
      position: relative;
    }

    .comparison-item li:before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #14b8a6;
      font-weight: bold;
    }

    /* Loading State */
    .loading {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #0f766e;
      border-radius: 50%;
      animation: loading 1.4s infinite;
    }

    @keyframes loading {
      0%, 100% {
        opacity: 0.3;
      }
      50% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1 data-i18n="pages.medicineFinder.medicineFinder">💊 Medicine Finder</h1>
      <p data-i18n="pages.medicineFinder.searchMedicinesByComposition">Search for diseases, medicines, and get detailed information about treatments and medications</p>
      <p style="font-size: 13px; color: #999;" data-i18n="pages.medicineFinder.medicineDatabase">Database includes 10,000+ diseases and medicines</p>
    </div>

    <!-- Search Cards -->
    <div class="search-section">
      <!-- Disease Search -->
      <div class="search-card">
        <h2 data-i18n="pages.medicineFinder.searchMedicinesByName">🏥 Search Disease</h2>
        <input 
          type="text" 
          class="search-input" 
          id="diseaseSearch" 
          data-i18n-attr="placeholder:pages.medicineFinder.searchInputPlaceholder"
          placeholder="e.g., pneumonia, diabetes, asthma..."
          onkeypress="if(event.key==='Enter') searchDisease()"
        />
        <button class="search-btn" onclick="searchDisease()" data-i18n="buttons.search">Search Disease</button>
        <div id="diseaseError" style="margin-top: 10px; display: none;"></div>
      </div>

      <!-- Medicine Search -->
      <div class="search-card">
        <h2 data-i18n="pages.medicineFinder.searchMedicine">💊 Search Medicine</h2>
        <input 
          type="text" 
          class="search-input" 
          id="medicineSearch" 
          data-i18n-attr="placeholder:pages.medicineFinder.searchInputPlaceholder"
          placeholder="e.g., aspirin, metformin, insulin..."
          onkeypress="if(event.key==='Enter') searchMedicine()"
        />
        <button class="search-btn" onclick="searchMedicine()" data-i18n="buttons.search">Search Medicine</button>
        <div id="medicineError" style="margin-top: 10px; display: none;"></div>
      </div>
    </div>

    <!-- Results Section -->
    <div class="results-section">
      <!-- Disease Results -->
      <div id="diseaseResults"></div>

      <!-- Medicine Results -->
      <div id="medicineResults"></div>

      <!-- Comparison Results -->
      <div id="comparisonResults"></div>
    </div>
  </div>

  <script type="module">
    import { DISEASE_MEDICINE_DATABASE, SYMPTOMS_TO_DISEASES } from './js/disease-medicine-database.js';
    import { ChatbotEngine } from './js/chatbot-utils.js';

    const chatbot = new ChatbotEngine();

    // Search disease
    window.searchDisease = function() {
      const searchTerm = document.getElementById('diseaseSearch').value.toLowerCase().trim();
      const resultsDiv = document.getElementById('diseaseResults');

      if (!searchTerm) {
        resultsDiv.innerHTML = `
          <div class="empty-state">
            <h3 data-i18n="auth.email">Enter a disease name</h3>
            <p data-i18n="pages.medicineFinder.searchInputPlaceholder">Try searching for: pneumonia, diabetes, asthma, etc.</p>
          </div>
        `;
        return;
      }

      // Find exact or partial match
      let matchedDiseases = [];
      Object.keys(DISEASE_MEDICINE_DATABASE).forEach(disease => {
        if (disease.includes(searchTerm) || searchTerm.includes(disease)) {
          matchedDiseases.push(disease);
        }
      });

      if (matchedDiseases.length === 0) {
        resultsDiv.innerHTML = `
          <div class="empty-state">
            <h3>No diseases found</h3>
            <p>Try a different search term or browse common conditions</p>
          </div>
        `;
        return;
      }

      // Display results
      let html = '';
      matchedDiseases.forEach(disease => {
        const info = DISEASE_MEDICINE_DATABASE[disease];
        html += generateDiseaseCard(disease, info);
      });

      resultsDiv.innerHTML = html;
    };

    // Search medicine
    window.searchMedicine = function() {
      const searchTerm = document.getElementById('medicineSearch').value.toLowerCase().trim();
      const resultsDiv = document.getElementById('medicineResults');

      if (!searchTerm) {
        resultsDiv.innerHTML = `
          <div class="empty-state">
            <h3>Enter a medicine name</h3>
            <p>Try searching for: aspirin, paracetamol, metformin, etc.</p>
          </div>
        `;
        return;
      }

      // Find medicines containing search term
      let matchedMedicines = {};
      Object.entries(DISEASE_MEDICINE_DATABASE).forEach(([disease, info]) => {
        info.medicines.forEach(med => {
          if (med.name.toLowerCase().includes(searchTerm)) {
            if (!matchedMedicines[med.name]) {
              matchedMedicines[med.name] = [];
            }
            matchedMedicines[med.name].push({ disease, dosage: med.dosage, frequency: med.frequency });
          }
        });
      });

      if (Object.keys(matchedMedicines).length === 0) {
        resultsDiv.innerHTML = `
          <div class="empty-state">
            <h3>No medicines found</h3>
            <p>Try a different search term</p>
          </div>
        `;
        return;
      }

      // Display results
      let html = '';
      Object.entries(matchedMedicines).forEach(([medicineName, uses]) => {
        html += generateMedicineCard(medicineName, uses);
      });

      resultsDiv.innerHTML = html;
    };

    // Generate disease card
    function generateDiseaseCard(disease, info) {
      const severityClass = `severity-${info.severity.toLowerCase().replace('-', '')}`;
      
      let html = `
        <div class="result-card">
          <div class="result-header">
            <div class="result-title">
              <h3>${disease.toUpperCase()}</h3>
              <p>${info.category} • ${info.duration}</p>
            </div>
            <span class="severity-badge ${severityClass}">${info.severity}</span>
          </div>

          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">📋 Symptoms</div>
              <div class="info-value">${info.symptoms}</div>
            </div>
            <div class="info-item">
              <div class="info-label">⏱️ Expected Duration</div>
              <div class="info-value">${info.duration}</div>
            </div>
          </div>

          <div class="medicines-section">
            <h4>💊 Recommended Medicines</h4>
      `;

      info.medicines.forEach(med => {
        html += `
          <div class="medicine-item">
            <div class="medicine-name">${med.name}</div>
            <div class="medicine-details">
              <span><strong>Dosage:</strong> ${med.dosage}</span>
              <span><strong>Frequency:</strong> ${med.frequency}</span>
            </div>
          </div>
        `;
      });

      html += `</div>`;

      if (info.consultDoctor) {
        html += `
          <div class="warning-box">
            ⚠️ <strong>IMPORTANT:</strong> This condition requires professional medical consultation. Please see a healthcare provider.
          </div>
        `;
      }

      html += `
        <div class="summary-box">
          📌 <strong>Summary:</strong> ${disease} is a ${info.severity.toLowerCase()} condition that is typically treated with the medicines listed above. It lasts approximately ${info.duration}. Always follow your doctor's prescriptions.
        </div>
      `;

      html += `</div>`;
      return html;
    }

    // Generate medicine card
    function generateMedicineCard(medicineName, uses) {
      let html = `
        <div class="result-card">
          <div class="result-header">
            <div class="result-title">
              <h3>${medicineName.toUpperCase()}</h3>
              <p>Used in ${uses.length} condition(s)</p>
            </div>
          </div>

          <div class="medicines-section">
            <h4>🏥 Used For</h4>
      `;

      uses.forEach((use, idx) => {
        html += `
          <div class="medicine-item">
            <div class="medicine-name">${use.disease.toUpperCase()}</div>
            <div class="medicine-details">
              <span><strong>Dosage:</strong> ${use.dosage}</span>
              <span><strong>Frequency:</strong> ${use.frequency}</span>
            </div>
          </div>
        `;
      });

      html += `
          </div>
          <div class="summary-box">
            📌 <strong>Info:</strong> ${medicineName} is used to treat multiple conditions. Dosage and frequency vary based on the specific disease and your condition. Always follow your doctor's recommendations.
          </div>
        </div>
      `;

      return html;
    }

    // Quick search buttons
    const quickDiseases = ['pneumonia', 'diabetes', 'asthma', 'covid-19'];
    const quickMedicines = ['paracetamol', 'aspirin', 'ibuprofen', 'metformin'];

    // Handle tab switching
    window.switchTab = function(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(`${tabName}Tab`).classList.add('active');
      event.target.classList.add('active');
    };

    // Focus input on load
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('diseaseSearch').focus();
    });
  </script>
  <!-- VILGAX AI Assistant - Advanced Version -->
  <script src="js/vilgax-assistant-advanced.js"></script>
  <!-- VILGAX Form Filling Engine -->
  <script src="js/vilgax-form-filler.js"></script>
  <!-- VILGAX Hotword Detection -->
  <script src="js/vilgax-hotword-detector.js"></script>
</body>
</html>
