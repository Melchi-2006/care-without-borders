<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Login | Care Without Borders</title>
  <link rel="stylesheet" href="style.css">

  <script>
    // ==================== DOCTOR LOGIN ====================
    
    window.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("doctorLoginForm");
      const togglePass = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const emailInput = document.getElementById("email");
      const licenseInput = document.getElementById("licenseNumber");

      // Password toggle
      togglePass.addEventListener("click", () => {
        passwordInput.type = passwordInput.type === "password" ? "text" : "password";
      });

      // Login handler
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const licenseNumber = licenseInput.value.trim();

        // Validation
        if (!email) {
          alert("❌ Please enter your email");
          return;
        }
        if (!password) {
          alert("❌ Please enter your password");
          return;
        }
        if (password.length < 6) {
          alert("❌ Password must be at least 6 characters");
          return;
        }
        if (!licenseNumber) {
          alert("❌ Please enter your medical license number");
          return;
        }

        // Show loading state
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = "🔄 Logging in...";
        submitBtn.disabled = true;

        // Send login request to backend
        fetch('/api/auth/login-doctor', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password, licenseNumber })
        })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            // Save session data
            localStorage.setItem('doctorLoggedIn', 'true');
            localStorage.setItem('doctorToken', data.token.token);
            localStorage.setItem('doctorData', JSON.stringify(data.doctor));
            
            alert(`✅ Welcome ${data.doctor.name}!`);
            window.location.href = 'doctor.html';
          } else {
            alert(`❌ ${data.error}`);
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
          }
        })
        .catch(error => {
          console.error('Login error:', error);
          alert('❌ Login failed. Please try again.');
          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
        });
      });
    });
  </script>
</head>
<body>

<div class="split-container">

  <!-- LEFT SIDE IMAGE -->
  <div class="left-panel">
    <img src="images/premium.jpg" alt="Doctor">

    <div class="overlay-text">
      <h1>🏥 Doctor Portal</h1>
      <p>Manage Your Patients. Efficiently.</p>
    </div>
  </div>

  <!-- RIGHT SIDE FORM -->
  <div class="right-panel">

    <div class="auth-card">
      <h2>Doctor Login</h2>

      <form id="doctorLoginForm">

        <!-- Floating Email -->
        <div class="floating-input">
          <input type="email" id="email" required>
          <label>Email</label>
        </div>

        <!-- Floating License Number -->
        <div class="floating-input">
          <input type="text" id="licenseNumber" required>
          <label>Medical License Number</label>
        </div>

        <!-- Floating Password -->
        <div class="floating-input password-field">
          <input type="password" id="password" required>
          <label>Password</label>
          <span id="togglePassword" style="cursor: pointer;">👁</span>
        </div>

        <button type="submit" class="btn-solid large">Login</button>

      </form>

      <p class="bottom-text">
        Don't have an account? <a href="doctor-register.html">Doctor Registration</a>
      </p>

      <p class="bottom-text">
        <a href="index.html">Back to Home</a> | <a href="login.html">Patient Login</a>
      </p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
