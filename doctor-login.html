<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Login | Care Without Borders</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase v10 Modular SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword,
      GoogleAuthProvider, 
      signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBMHhwzdjBEr9GaMNnhxugg0K71WrPN0n4",
      authDomain: "care-without-borders-789dd.firebaseapp.com",
      projectId: "care-without-borders-789dd",
      storageBucket: "care-without-borders-789dd.firebasestorage.app",
      messagingSenderId: "736136702535",
      appId: "1:736136702535:web:c862ef87108bd027bb9f62",
      measurementId: "G-9PLWT8WHC3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // DOCTOR LOGIN FORM
    window.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("doctorLoginForm");
      const togglePass = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const emailInput = document.getElementById("email");
      const licenseInput = document.getElementById("licenseNumber");

      // Password toggle
      togglePass.addEventListener("click", () => {
        passwordInput.type = passwordInput.type === "password" ? "text" : "password";
      });

      // Email/Password Login
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const licenseNumber = licenseInput.value.trim();

        // Validation
        if (!email) {
          alert("Please enter your email");
          return;
        }
        if (!password) {
          alert("Please enter your password");
          return;
        }
        if (!licenseNumber) {
          alert("Please enter your medical license number");
          return;
        }

        signInWithEmailAndPassword(auth, email, password)
          .then((userCredential) => {
            // Verify doctor role and license
            const user = userCredential.user;
            const doctorRef = ref(db, 'doctors/' + user.uid);
            
            get(doctorRef)
              .then((snapshot) => {
                if (snapshot.exists()) {
                  const doctorData = snapshot.val();
                  
                  // Verify license number
                  if (doctorData.licenseNumber === licenseNumber) {
                    alert("Login Successful! Welcome Dr. " + (doctorData.name || email));
                    // Redirect to doctor dashboard
                    window.location.href = "doctor.html";
                  } else {
                    alert("Incorrect medical license number. Please verify and try again.");
                  }
                } else {
                  alert("You are not registered as a doctor. Please register first.");
                }
              })
              .catch((error) => {
                console.error("Database Error:", error);
                alert("Error verifying doctor credentials. Please try again.");
              });
          })
          .catch(error => {
            console.error("Login Error:", error);
            let message = "Login failed. ";
            
            if (error.code === "auth/invalid-credential") {
              message += "Email or password is incorrect. Please check your credentials.";
            } else if (error.code === "auth/user-not-found") {
              message += "This email is not registered. Please sign up first.";
            } else if (error.code === "auth/wrong-password") {
              message += "Incorrect password. Please try again.";
            } else if (error.code === "auth/invalid-email") {
              message += "Invalid email format.";
            } else {
              message += error.message;
            }
            
            alert(message);
          });
      });

      // Google Login for Doctors
      document.getElementById("googleLogin").addEventListener("click", (e) => {
        e.preventDefault();
        
        const btn = document.getElementById("googleLogin");
        btn.disabled = true;
        btn.textContent = "🔍 Logging in...";
        
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ 'prompt': 'select_account' });
        
        signInWithPopup(auth, provider)
          .then((result) => {
            console.log("Google Login Success:", result.user.email);
            
            // Verify doctor role
            const user = result.user;
            const doctorRef = ref(db, 'doctors/' + user.uid);
            
            get(doctorRef)
              .then((snapshot) => {
                if (snapshot.exists()) {
                  alert("Login Successful! Welcome Dr. " + (snapshot.val().name || user.email));
                  window.location.href = "doctor.html";
                } else {
                  alert("You are not registered as a doctor. Please register first.");
                  btn.disabled = false;
                  btn.textContent = "🔍 Login with Google";
                }
              })
              .catch((error) => {
                console.error("Database Error:", error);
                alert("Error verifying doctor credentials.");
                btn.disabled = false;
                btn.textContent = "🔍 Login with Google";
              });
          })
          .catch((error) => {
            console.error("Google Sign-In Error:", error);
            alert("Failed to login with Google: " + error.message);
            btn.disabled = false;
            btn.textContent = "🔍 Login with Google";
          });
      });
    });
  </script>
</head>
<body>

<div class="split-container">

  <!-- LEFT SIDE IMAGE -->
  <div class="left-panel">
    <img src="images/premium.jpg" alt="Doctor">

    <div class="overlay-text">
      <h1>🏥 Doctor Portal</h1>
      <p>Manage Your Patients. Efficiently.</p>
    </div>
  </div>

  <!-- RIGHT SIDE FORM -->
  <div class="right-panel">

    <div class="auth-card">
      <h2>Doctor Login</h2>

      <form id="doctorLoginForm">

        <!-- Floating Email -->
        <div class="floating-input">
          <input type="email" id="email" required>
          <label>Email</label>
        </div>

        <!-- Floating License Number -->
        <div class="floating-input">
          <input type="text" id="licenseNumber" required>
          <label>Medical License Number</label>
        </div>

        <!-- Floating Password -->
        <div class="floating-input password-field">
          <input type="password" id="password" required>
          <label>Password</label>
          <span id="togglePassword">👁</span>
        </div>

        <button type="submit" class="btn-solid large">Login</button>

        <div class="divider">OR</div>

        <button type="button" id="googleLogin" class="google-btn">
          🔍 Continue with Google
        </button>

      </form>

      <p class="bottom-text">
        Not registered yet? <a href="doctor-register.html">Register as Doctor</a> | <a href="login.html">Patient Login</a>
      </p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
