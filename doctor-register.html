<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Registration | Care Without Borders</title>
  <link rel="stylesheet" href="style.css">

  <script>
    // ==================== DOCTOR REGISTRATION ====================
    
    window.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("doctorRegisterForm");
      const togglePass = document.getElementById("togglePassword");
      const toggleConfirm = document.getElementById("toggleConfirm");
      const passwordInput = document.getElementById("password");
      const confirmInput = document.getElementById("confirmPassword");

      // Password toggle
      togglePass.addEventListener("click", () => {
        passwordInput.type = passwordInput.type === "password" ? "text" : "password";
      });

      toggleConfirm.addEventListener("click", () => {
        confirmInput.type = confirmInput.type === "password" ? "text" : "password";
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const licenseNumber = document.getElementById("licenseNumber").value.trim();
        const specialization = document.getElementById("specialization").value;
        const phone = document.getElementById("phone").value.trim();
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        // Validation
        if (!name) {
          alert("❌ Please enter your full name");
          return;
        }
        if (!email) {
          alert("❌ Please enter your email");
          return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          alert("❌ Please enter a valid email");
          return;
        }
        if (!licenseNumber) {
          alert("❌ Please enter your medical license number");
          return;
        }
        if (!specialization) {
          alert("❌ Please select your specialization");
          return;
        }
        if (!phone) {
          alert("❌ Please enter your phone number");
          return;
        }
        if (!password) {
          alert("❌ Please enter a password");
          return;
        }
        if (password.length < 6) {
          alert("❌ Password must be at least 6 characters");
          return;
        }
        if (password !== confirm) {
          alert("❌ Passwords do not match");
          return;
        }

        // Show loading state
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = "🔄 Registering...";
        submitBtn.disabled = true;

        // Send registration request to backend
        fetch('/api/auth/register-doctor', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            email, 
            password, 
            name,
            licenseNumber,
            specialization,
            phone
          })
        })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            alert(`✅ ${data.message}\n\nYou can now login as a doctor.`);
            window.location.href = 'doctor-login.html';
          } else {
            alert(`❌ ${data.error}`);
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
          }
        })
        .catch(error => {
          console.error('Registration error:', error);
          alert('❌ Registration failed. Please try again.');
          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
        });
      });
    });
  </script>

  <style>
    .specialization-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: -5px;
    }
  </style>
</head>
<body>

<div class="split-container">

  <!-- LEFT IMAGE PANEL -->
  <div class="left-panel">
    <img src="images/premium.jpg" alt="Doctor">

    <div class="overlay-text">
      <h1>🏥 Doctor Registration</h1>
      <p>Join our network of healthcare professionals</p>
    </div>
  </div>

  <!-- RIGHT FORM PANEL -->
  <div class="right-panel">
    <div class="auth-card" style="max-height: 90vh; overflow-y: auto;">
      <h2>Doctor Registration</h2>

      <form id="doctorRegisterForm">

        <div class="floating-input">
          <input type="text" id="name" required>
          <label>Full Name</label>
        </div>

        <div class="floating-input">
          <input type="email" id="email" required>
          <label>Email Address</label>
        </div>

        <div class="floating-input">
          <input type="text" id="licenseNumber" required>
          <label>Medical License Number</label>
        </div>

        <div class="floating-input">
          <select id="specialization" required>
            <option value="">Select Specialization</option>
            <option value="Cardiology">Cardiology</option>
            <option value="Neurology">Neurology</option>
            <option value="Orthopedics">Orthopedics</option>
            <option value="Pediatrics">Pediatrics</option>
            <option value="Psychiatry">Psychiatry</option>
            <option value="Dermatology">Dermatology</option>
            <option value="Dentistry">Dentistry</option>
            <option value="General Practice">General Practice</option>
            <option value="Surgery">Surgery</option>
            <option value="Oncology">Oncology</option>
          </select>
          <label>Specialization</label>
        </div>

        <div class="floating-input">
          <input type="tel" id="phone" required>
          <label>Phone Number</label>
        </div>

        <div class="floating-input password-field">
          <input type="password" id="password" required>
          <label>Password</label>
          <span id="togglePassword" style="cursor: pointer;">👁</span>
        </div>

        <div class="floating-input password-field">
          <input type="password" id="confirmPassword" required>
          <label>Confirm Password</label>
          <span id="toggleConfirm" style="cursor: pointer;">👁</span>
        </div>

        <button type="submit" class="btn-solid large">Register as Doctor</button>

      </form>

      <p class="bottom-text">
        Already registered? <a href="doctor-login.html">Doctor Login</a> | <a href="index.html">Back to Home</a>
      </p>

    </div>
  </div>

</div>

</body>
</html>
