<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Care Without Borders</title>
  <link rel="stylesheet" href="style.css">

  <script>
    // ==================== PATIENT LOGIN ====================
    
    window.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("loginForm");
      const togglePass = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const emailInput = document.getElementById("email");

      // Password toggle
      togglePass.addEventListener("click", () => {
        passwordInput.type = passwordInput.type === "password" ? "text" : "password";
      });

      // Login handler
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Validation
        if (!email) {
          alert("❌ Please enter your email");
          return;
        }
        if (!password) {
          alert("❌ Please enter your password");
          return;
        }
        if (password.length < 6) {
          alert("❌ Password must be at least 6 characters");
          return;
        }

        // Show loading state
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = "🔄 Logging in...";
        submitBtn.disabled = true;

        // Send login request to backend
        fetch('/api/auth/login-patient', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            // Save session data
            localStorage.setItem('patientLoggedIn', 'true');
            localStorage.setItem('patientToken', data.token.token);
            localStorage.setItem('patientData', JSON.stringify(data.patient));
            
            alert(`✅ Welcome ${data.patient.name}!`);
            window.location.href = 'patient.html';
          } else {
            alert(`❌ ${data.error}`);
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
          }
        })
        .catch(error => {
          console.error('Login error:', error);
          alert('❌ Login failed. Please try again.');
          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
        });
      });
    });
  </script>
</head>
<body>

<div class="split-container">

  <!-- LEFT SIDE IMAGE -->
<div class="left-panel">
  <img src="images/premium.jpg" alt="Healthcare Premium">

  <div class="overlay-text">
    <h1>Care Without Borders</h1>
    <p>Compassion. Technology. Trust.</p>
  </div>
</div>

  <!-- RIGHT SIDE FORM -->
  <div class="right-panel">

    <div class="auth-card">
      <h2>Welcome Back</h2>

      <form id="loginForm">

        <!-- Floating Email -->
        <div class="floating-input">
          <input type="email" id="email" required>
          <label>Email</label>
        </div>

        <!-- Floating Password -->
        <div class="floating-input password-field">
          <input type="password" id="password" required>
          <label>Password</label>
          <span id="togglePassword" style="cursor: pointer;">👁</span>
        </div>

        <button type="submit" class="btn-solid large">Login</button>

      </form>

      <p class="bottom-text">
        Don't have an account? <a href="register.html">Create Account</a> | <a href="index.html">Back to Home</a>
      </p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
