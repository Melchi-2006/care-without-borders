<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Care Without Borders</title>
  <link rel="stylesheet" href="style.css">

  <script>
    // ==================== LOCAL PATIENT AUTHENTICATION ====================
    // Simple authentication without Firebase dependency
    
    window.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("loginForm");
      const togglePass = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const emailInput = document.getElementById("email");

      // Password toggle
      togglePass.addEventListener("click", () => {
        passwordInput.type = passwordInput.type === "password" ? "text" : "password";
      });

      // Demo patients for testing
      const DEMO_PATIENTS = [
        {
          email: "patient@example.com",
          password: "patient123",
          name: "John Doe"
        },
        {
          email: "alice@example.com",
          password: "alice123",
          name: "Alice Johnson"
        },
        {
          email: "bob@example.com",
          password: "bob123",
          name: "Bob Williams"
        }
      ];

      // Initialize demo credentials in localStorage if not exists
      if (!localStorage.getItem('patientCredentials')) {
        localStorage.setItem('patientCredentials', JSON.stringify(DEMO_PATIENTS));
      }

      // Email/Password Login
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Validation
        if (!email) {
          alert("❌ Please enter your email");
          return;
        }
        if (!password) {
          alert("❌ Please enter your password");
          return;
        }

        // Get stored credentials
        const storedCredentials = JSON.parse(localStorage.getItem('patientCredentials') || '[]');
        
        // Find matching patient
        const patient = storedCredentials.find(p => 
          p.email === email && 
          p.password === password
        );

        if (patient) {
          // Login successful
          localStorage.setItem('patientLoggedIn', 'true');
          localStorage.setItem('patientEmail', email);
          localStorage.setItem('patientName', patient.name);
          
          alert(`✅ Login Successful! Welcome ${patient.name}`);
          window.location.href = "patient.html";
        } else {
          // Check what's wrong
          const emailExists = storedCredentials.some(p => p.email === email);
          
          if (!emailExists) {
            alert("❌ Email not registered. Would you like to create an account?");
          } else {
            alert("❌ Incorrect password. Please try again.");
          }
        }
      });

      // Show demo credentials
      document.getElementById("demoCredentials").addEventListener("click", (e) => {
        e.preventDefault();
        const credentials = JSON.parse(localStorage.getItem('patientCredentials') || '[]');
        let message = "📋 DEMO CREDENTIALS FOR TESTING:\n\n";
        credentials.forEach((patient, idx) => {
          message += `Patient ${idx + 1}:\n`;
          message += `  Email: ${patient.email}\n`;
          message += `  Password: ${patient.password}\n\n`;
        });
        alert(message);
      });

      // Quick fill with first demo account
      document.getElementById("useDemoAccount").addEventListener("click", (e) => {
        e.preventDefault();
        const credentials = JSON.parse(localStorage.getItem('patientCredentials') || '[]');
        if (credentials.length > 0) {
          emailInput.value = credentials[0].email;
          passwordInput.value = credentials[0].password;
          alert("✅ Demo credentials filled! Click Login to proceed.");
        }
      });
    });
  </script>
</head>
<body>

<div class="split-container">

  <!-- LEFT SIDE IMAGE -->
<div class="left-panel">
  <img src="images/premium.jpg" alt="Healthcare Premium">

  <div class="overlay-text">
    <h1>Care Without Borders</h1>
    <p>Compassion. Technology. Trust.</p>
  </div>
</div>

  <!-- RIGHT SIDE FORM -->
  <div class="right-panel">

    <div class="auth-card">
      <h2>Welcome Back</h2>

      <form id="loginForm">

        <!-- Floating Email -->
        <div class="floating-input">
          <input type="email" id="email" required>
          <label>Email</label>
        </div>

        <!-- Floating Password -->
        <div class="floating-input password-field">
          <input type="password" id="password" required>
          <label>Password</label>
          <span id="togglePassword" style="cursor: pointer;">👁</span>
        </div>

        <button type="submit" class="btn-solid large">Login</button>

        <div class="divider">TESTING</div>

        <button type="button" id="useDemoAccount" class="btn-outline" style="width: 100%; margin-bottom: 10px; padding: 12px; background: #e8f5e9; color: #2e7d32; border: 2px solid #2e7d32; border-radius: 8px; cursor: pointer; font-weight: 600;">
          ✅ Fill Demo Credentials
        </button>

        <button type="button" id="demoCredentials" class="btn-outline" style="width: 100%; padding: 12px; background: #e3f2fd; color: #1876d2; border: 2px solid #1876d2; border-radius: 8px; cursor: pointer; font-weight: 600;">
          📋 Show All Demo Accounts
        </button>

      </form>

      <div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px; margin-top: 15px; font-size: 13px; color: #856404;">
        <strong>💡 Demo Mode:</strong> Use the button above to fill demo credentials for testing. For production, edit localStorage 'patientCredentials' with your own secure credentials.
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
