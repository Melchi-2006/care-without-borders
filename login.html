<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Login | Care Without Borders</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .login-container {
      display: flex;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
    }

    .login-card {
      width: 100%;
      max-width: 450px;
      margin: auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }

    .login-card h1 {
      color: #0f766e;
      margin-bottom: 10px;
      text-align: center;
      font-size: 28px;
    }

    .login-card p {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
    }

    .password-field {
      position: relative;
    }

    .password-field .toggle-eye {
      position: absolute;
      right: 12px;
      top: 38px;
      cursor: pointer;
      color: #999;
      transition: all 0.3s;
    }

    .password-field .toggle-eye:hover {
      color: #0f766e;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #999;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .divider span {
      padding: 0 10px;
    }

    .google-btn {
      width: 100%;
      padding: 12px;
      background: white;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .google-btn:hover {
      background: #f9f9f9;
      border-color: #0f766e;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
    }

    .google-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .footer-text a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .footer-text a:hover {
      color: #14b8a6;
      text-decoration: underline;
    }

    .alert {
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
    }

    .alert.error {
      background: #fee;
      color: #c33;
      border-left: 4px solid #c33;
      display: block;
    }

    .alert.success {
      background: #efe;
      color: #3c3;
      border-left: 4px solid #3c3;
      display: block;
    }

    .alert i {
      margin-right: 8px;
    }

    @media (max-width: 600px) {
      .login-card {
        padding: 25px;
      }

      .login-card h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <h1>❤️ Patient Login</h1>
    <p>Care Without Borders</p>

    <!-- Alert Messages -->
    <div id="alertBox" class="alert"></div>

    <!-- Email/Password Login -->
    <form id="loginForm" onsubmit="handleEmailLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group password-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
        <span class="toggle-eye" onclick="togglePasswordVisibility()">👁</span>
      </div>

      <button type="submit" class="btn-login" id="emailLoginBtn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>OR</span>
    </div>

    <!-- Google Login -->
    <button class="google-btn" id="googleLoginBtn" onclick="handleGoogleLogin(event)">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#4285F4" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <!-- Footer Links -->
    <div class="footer-text">
      Don't have an account? <a href="register.html">Sign Up</a><br>
      <a href="index.html">← Back to Home</a>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db, googleProvider, googleSignIn } from './js/firebase.js';
  import { 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword,
    setPersistence,
    browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { 
    doc, 
    setDoc, 
    getDoc 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Set Firebase persistence
  setPersistence(auth, browserLocalPersistence);

  // Make functions global
  window.togglePasswordVisibility = function() {
    const passwordInput = document.getElementById('password');
    const toggleEye = document.querySelector('.toggle-eye');
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      toggleEye.textContent = '👁‍🗨';
    } else {
      passwordInput.type = 'password';
      toggleEye.textContent = '👁';
    }
  };

  function showAlert(message, type = 'error') {
    const alertBox = document.getElementById('alertBox');
    const icon = type === 'error' ? '❌' : '✅';
    alertBox.className = `alert ${type}`;
    alertBox.innerHTML = `<i class="fas fa-${type === 'error' ? 'times-circle' : 'check-circle'}"></i> ${message}`;
    
    if (type === 'success') {
      setTimeout(() => {
        alertBox.style.display = 'none';
      }, 2000);
    }
  }

  // Email/Password Login Handler
  window.handleEmailLogin = async function(event) {
    event.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('emailLoginBtn');
    
    // Validation
    if (!email || !password) {
      showAlert('Please fill in all fields', 'error');
      return;
    }

    if (password.length < 6) {
      showAlert('Password must be at least 6 characters', 'error');
      return;
    }

    try {
      loginBtn.disabled = true;
      loginBtn.textContent = '🔄 Logging in...';

      // Try Firebase authentication first
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      
      // Check if user exists in Firestore
      const userDoc = await getDoc(doc(db, "users", userCredential.user.uid));
      
      if (!userDoc.exists()) {
        // User exists in Firebase but not in Firestore - create Firestore entry
        await setDoc(doc(db, "users", userCredential.user.uid), {
          email: email,
          role: "patient",
          name: userCredential.user.displayName || email.split('@')[0],
          createdAt: new Date()
        });
      }

      showAlert(`✅ Welcome ${userCredential.user.displayName || 'Patient'}!`, 'success');
      
      setTimeout(() => {
        window.location.href = 'patient.html';
      }, 1500);

    } catch (error) {
      console.error('Login error:', error);
      
      if (error.code === 'auth/user-not-found') {
        showAlert('Email not registered. Please sign up first.', 'error');
      } else if (error.code === 'auth/wrong-password') {
        showAlert('Incorrect password. Please try again.', 'error');
      } else if (error.code === 'auth/invalid-email') {
        showAlert('Invalid email format.', 'error');
      } else {
        showAlert(`Login failed: ${error.message}`, 'error');
      }
      
      loginBtn.disabled = false;
      loginBtn.textContent = '🔐 Login';
    }
  };

  // Google Login Handler
  window.handleGoogleLogin = async function(event) {
    event.preventDefault();
    
    const googleBtn = document.getElementById('googleLoginBtn');
    
    try {
      googleBtn.disabled = true;
      googleBtn.textContent = '🔄 Connecting with Google...';

      // Configure Google provider
      googleProvider.setCustomParameters({ 'prompt': 'select_account' });
      
      // Sign in with Google popup
      const result = await googleSignIn(auth, googleProvider);
      
      // User signed in successfully
      const user = result.user;
      
      // Check if user exists in Firestore
      const userDoc = await getDoc(doc(db, "users", user.uid));
      
      if (!userDoc.exists()) {
        // Create new patient record in Firestore
        await setDoc(doc(db, "users", user.uid), {
          email: user.email,
          name: user.displayName || user.email.split('@')[0],
          role: "patient",
          photoURL: user.photoURL || "",
          loginMethod: "Google",
          createdAt: new Date()
        });
      }
      
      showAlert(`✅ Welcome ${user.displayName || 'Patient'}!`, 'success');
      
      setTimeout(() => {
        window.location.href = 'patient.html';
      }, 1500);

    } catch (error) {
      console.error('Google Login Error:', error);
      
      if (error.code === 'auth/popup-closed-by-user') {
        // User closed the popup
        googleBtn.disabled = false;
        googleBtn.textContent = 'Continue with Google';
        return;
      }
      
      if (error.code === 'auth/unauthorized-domain') {
        showAlert('⚠️ Unauthorized domain. Please add this URL to Firebase settings.', 'error');
      } else if (error.code === 'auth/network-request-failed') {
        showAlert('❌ Network error. Please check your internet connection.', 'error');
      } else {
        showAlert(`Google Login Error: ${error.message}`, 'error');
      }
      
      googleBtn.disabled = false;
      googleBtn.textContent = 'Continue with Google';
    }
  };

  // Prevent form submission on Enter in password field
  document.getElementById('password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    }
  });
</script>

</body>
</html>
