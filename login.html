<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Login | Care Without Borders</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="config.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: #ffffff;
      overflow: hidden;
    }

    /* ==================== SPLIT CONTAINER ==================== */
    .login-container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* ==================== LEFT SECTION ==================== */
    .left-section {
      flex: 1;
      background: linear-gradient(135deg, #0d7377 0%, #14919b 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-pattern {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.3;
      animation: pulse 20s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.05); opacity: 0.5; }
    }

    .healthcare-image-wrapper {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .healthcare-image-wrapper img {
      max-width: 90%;
      height: auto;
      max-height: 500px;
      filter: drop-shadow(0 20px 60px rgba(0, 0, 0, 0.3));
      animation: float 6s ease-in-out infinite;
      border-radius: 20px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-30px); }
    }

    .overlay-text {
      position: absolute;
      bottom: 60px;
      left: 40px;
      right: 40px;
      color: white;
      z-index: 3;
      text-align: left;
    }

    .overlay-text h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 15px;
      line-height: 1.3;
    }

    .overlay-text p {
      font-size: 16px;
      opacity: 0.9;
      line-height: 1.6;
    }

    /* ==================== RIGHT SECTION ==================== */
    .right-section {
      flex: 1;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow-y: auto;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      animation: slideInRight 0.6s ease-out;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .auth-header {
      margin-bottom: 35px;
    }

    .auth-header h1 {
      font-size: 32px;
      color: #0d7377;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .auth-header p {
      color: #666;
      font-size: 15px;
      line-height: 1.5;
    }

    /* Alert Box */
    .alert {
      background: #fef3f3;
      border-left: 4px solid #ff6b6b;
      border-radius: 8px;
      padding: 12px 15px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #d63031;
      display: none;
      animation: slideDown 0.3s ease-out;
    }

    .alert.show {
      display: block;
    }

    .alert.success {
      background: #f1fdf4;
      border-left-color: #27ae60;
      color: #27ae60;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #f0f0f0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
      background: #fafafa;
      font-family: inherit;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #0d7377;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(13, 115, 119, 0.08);
    }

    .form-group input::placeholder {
      color: #bbb;
    }

    .password-field {
      position: relative;
    }

    .password-field .toggle-eye {
      position: absolute;
      right: 14px;
      top: 40px;
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-size: 18px;
      transition: color 0.3s ease;
    }

    .password-field .toggle-eye:hover {
      color: #0d7377;
    }

    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .remember-me input {
      cursor: pointer;
      accent-color: #0d7377;
    }

    .remember-me label {
      cursor: pointer;
      color: #333;
      font-weight: 500;
    }

    .forgot-password {
      color: #0d7377;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .forgot-password:hover {
      opacity: 0.7;
      text-decoration: underline;
    }

    /* Primary Button */
    .btn-login {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #0d7377 0%, #14919b 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 18px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(13, 115, 119, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 25px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #e8e8e8;
    }

    .divider-text {
      font-size: 13px;
      color: #999;
      font-weight: 500;
    }

    /* Social Button */
    .google-btn {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #f0f0f0;
      background: #fafafa;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      color: #333;
      margin-bottom: 20px;
    }

    .google-btn:hover {
      background: #fff;
      border-color: #0d7377;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(13, 115, 119, 0.1);
    }

    .google-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    .footer-text {
      text-align: center;
      color: #666;
      font-size: 14px;
      line-height: 1.8;
    }

    .footer-text a {
      color: #0d7377;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .footer-text a:hover {
      opacity: 0.7;
      text-decoration: underline;
    }

    .glass-effect {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 1024px) {
      .left-section .overlay-text h1 {
        font-size: 28px;
      }

      .left-section .overlay-text {
        bottom: 40px;
        left: 30px;
        right: 30px;
      }

      .healthcare-image-wrapper img {
        max-height: 400px;
      }
    }

    @media (max-width: 768px) {
      .login-container {
        flex-direction: column;
      }

      .left-section {
        flex: 0 0 200px;
        min-height: 200px;
      }

      .right-section {
        flex: 1;
        padding: 30px 20px;
      }

      .login-card {
        max-width: 100%;
      }

      .healthcare-image-wrapper img {
        max-height: 150px;
      }

      .left-section .overlay-text {
        bottom: 20px;
        left: 20px;
        right: 20px;
      }

      .left-section .overlay-text h1 {
        font-size: 20px;
      }

      .left-section .overlay-text p {
        font-size: 13px;
      }

      .auth-header h1 {
        font-size: 26px;
      }
    }

    @media (max-width: 480px) {
      .left-section {
        flex: 0 0 150px;
      }

      .right-section {
        padding: 20px;
      }

      .auth-header h1 {
        font-size: 22px;
      }

      .form-group input {
        padding: 12px 14px;
        font-size: 16px;
      }

      .btn-login {
        padding: 12px 16px;
      }

      .form-footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
  </style>
</head>
<body>

<div class="login-container">
  <!-- ==================== LEFT SECTION ==================== -->
  <div class="left-section">
    <div class="bg-pattern"></div>
    <div class="glass-effect"></div>

    <div class="healthcare-image-wrapper">
      <img src="images/premium.jpg" alt="Healthcare Professional">
    </div>

    <div class="overlay-text">
      <h1>❤️ Care Without Borders</h1>
      <p>Accessible Healthcare for Everyone, Everywhere</p>
    </div>
  </div>

  <!-- ==================== RIGHT SECTION ==================== -->
  <div class="right-section">
    <div class="login-card">
      <!-- Header -->
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Access your healthcare dashboard</p>
      </div>

      <!-- Alert Messages -->
      <div id="alertBox" class="alert"></div>

      <!-- Email/Password Login -->
      <form id="loginForm" onsubmit="handleEmailLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="form-input-wrapper">
            <input type="email" id="email" placeholder="your@email.com" required>
          </div>
        </div>

        <div class="form-group password-field">
          <label for="password">Password</label>
          <div class="form-input-wrapper">
            <input type="password" id="password" placeholder="Enter your password" required>
            <span class="toggle-eye" onclick="togglePasswordVisibility()">
              <i class="fas fa-eye"></i>
            </span>
          </div>
        </div>

        <div class="form-footer">
          <div class="remember-me">
            <input type="checkbox" id="rememberMe" checked>
            <label for="rememberMe">Remember me</label>
          </div>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login" id="emailLoginBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">OR</span>
        <div class="divider-line"></div>
      </div>

      <!-- Google Login -->
      <button class="google-btn" id="googleLoginBtn" onclick="handleGoogleLogin(event)">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#4285F4" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Footer Links -->
      <div class="footer-text">
        Don't have an account? <a href="register.html">Sign Up</a><br>
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db, googleProvider, googleSignIn } from './js/firebase.js';
  import { 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword,
    setPersistence,
    browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { 
    doc, 
    setDoc, 
    getDoc 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Set Firebase persistence
  setPersistence(auth, browserLocalPersistence);

  // Make functions global
  window.togglePasswordVisibility = function() {
    const passwordInput = document.getElementById('password');
    const toggleEye = document.querySelector('.toggle-eye');
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      toggleEye.textContent = '👁‍🗨';
    } else {
      passwordInput.type = 'password';
      toggleEye.textContent = '👁';
    }
  };

  function showAlert(message, type = 'error') {
    const alertBox = document.getElementById('alertBox');
    const icon = type === 'error' ? '❌' : '✅';
    alertBox.className = `alert ${type}`;
    alertBox.innerHTML = `<i class="fas fa-${type === 'error' ? 'times-circle' : 'check-circle'}"></i> ${message}`;
    
    if (type === 'success') {
      setTimeout(() => {
        alertBox.style.display = 'none';
      }, 2000);
    }
  }

  // Email/Password Login Handler
  window.handleEmailLogin = async function(event) {
    event.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('emailLoginBtn');
    
    // Validation
    if (!email || !password) {
      showAlert('Please fill in all fields', 'error');
      return;
    }

    if (password.length < 6) {
      showAlert('Password must be at least 6 characters', 'error');
      return;
    }

    try {
      loginBtn.disabled = true;
      loginBtn.textContent = '🔄 Logging in...';

      // Call backend API for patient login
      const response = await fetch(CONFIG.getApiUrl(CONFIG.ENDPOINTS.LOGIN_PATIENT), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (data.success) {
        // Save session data
        localStorage.setItem('patientLoggedIn', 'true');
        localStorage.setItem('patientToken', data.token.token);
        localStorage.setItem('patientData', JSON.stringify(data.patient));
        
        showAlert(`✅ Welcome ${data.patient.name}!`, 'success');
        
        setTimeout(() => {
          window.location.href = 'patient.html';
        }, 1500);
      } else {
        showAlert(`Login failed: ${data.error}`, 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = '🔐 Login';
      }
    } catch (error) {
      console.error('Login error:', error);
      showAlert(`Login failed: ${error.message}`, 'error');
      loginBtn.disabled = false;
      loginBtn.textContent = '🔐 Login';
    }
  };

  // Google Login Handler
  window.handleGoogleLogin = async function(event) {
    event.preventDefault();
    
    const googleBtn = document.getElementById('googleLoginBtn');
    
    try {
      googleBtn.disabled = true;
      googleBtn.textContent = '🔄 Connecting with Google...';

      // Configure Google provider
      googleProvider.setCustomParameters({ 'prompt': 'select_account' });
      
      // Sign in with Google popup
      const result = await googleSignIn(auth, googleProvider);
      
      // User signed in successfully
      const user = result.user;
      
      // Check if user exists in Firestore
      const userDoc = await getDoc(doc(db, "users", user.uid));
      
      if (!userDoc.exists()) {
        // Create new patient record in Firestore
        await setDoc(doc(db, "users", user.uid), {
          email: user.email,
          name: user.displayName || user.email.split('@')[0],
          role: "patient",
          photoURL: user.photoURL || "",
          loginMethod: "Google",
          createdAt: new Date()
        });
      }
      
      showAlert(`✅ Welcome ${user.displayName || 'Patient'}!`, 'success');
      
      setTimeout(() => {
        window.location.href = 'patient.html';
      }, 1500);

    } catch (error) {
      console.error('Google Login Error:', error);
      
      if (error.code === 'auth/popup-closed-by-user') {
        // User closed the popup
        googleBtn.disabled = false;
        googleBtn.textContent = 'Continue with Google';
        return;
      }
      
      if (error.code === 'auth/unauthorized-domain') {
        showAlert('⚠️ Unauthorized domain. Please add this URL to Firebase settings.', 'error');
      } else if (error.code === 'auth/network-request-failed') {
        showAlert('❌ Network error. Please check your internet connection.', 'error');
      } else {
        showAlert(`Google Login Error: ${error.message}`, 'error');
      }
      
      googleBtn.disabled = false;
      googleBtn.textContent = 'Continue with Google';
    }
  };

  // Prevent form submission on Enter in password field
  document.getElementById('password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    }
  });
</script>

</body>
</html>
