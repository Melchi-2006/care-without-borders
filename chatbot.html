<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Health Chatbot | Care Without Borders</title>
  <!-- Multilingual Support - Load First! -->
  <script src="js/i18n.js"></script>
  <!-- Audio System -->
  <script src="js/audio.js"></script>
  <!-- Modern UI Redesign -->
  <link rel="stylesheet" href="css/theme-redesign.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .chatbot-container {
      width: 100%;
      max-width: 900px;
      height: 90vh;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chatbot-header {
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #0d6a63;
    }

    .header-title h2 {
      margin: 0 0 5px 0;
      font-size: 24px;
    }

    .header-title p {
      margin: 0;
      font-size: 13px;
      opacity: 0.9;
    }

    .header-actions button {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      margin-left: 10px;
      transition: all 0.3s ease;
      font-size: 13px;
    }

    .header-actions button:hover {
      background: rgba(255, 255, 255, 0.3);
      border-color: white;
    }

    /* Chat Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: #f8f9fa;
    }

    .message {
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .message-avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .user .message-avatar {
      background: #667eea;
      color: white;
    }

    .assistant .message-avatar {
      background: #14b8a6;
      color: white;
    }

    .message-content {
      max-width: 60%;
      padding: 12px 15px;
      border-radius: 10px;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 14px;
    }

    .user .message-content {
      background: #667eea;
      color: white;
      border-bottom-right-radius: 0;
    }

    .assistant .message-content {
      background: white;
      color: #333;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 0;
    }

    .assistant .message-content strong {
      color: #0f766e;
    }

    .message-timestamp {
      font-size: 11px;
      color: #999;
      margin-top: 5px;
    }

    .emergency {
      background: #ffebee !important;
      color: #c62828 !important;
      border: 2px solid #c62828 !important;
    }

    .info-message {
      background: #e3f2fd !important;
      color: #1565c0 !important;
      border-left: 4px solid #1565c0;
    }

    .warning-message {
      background: #fff3e0 !important;
      color: #e65100 !important;
      border-left: 4px solid #f57c00;
    }

    /* Suggestions */
    .suggestions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .suggestion-btn {
      background: rgba(15, 118, 110, 0.1);
      color: #0f766e;
      border: 1px solid #0f766e;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .suggestion-btn:hover {
      background: #0f766e;
      color: white;
    }

    /* Input Area */
    .chat-input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }

    .chat-input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 10px rgba(15, 118, 110, 0.2);
    }

    .send-btn {
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      color: white;
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s ease;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(15, 118, 110, 0.3);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    /* Quick Actions */
    .quick-actions {
      background: #f0f0f0;
      padding: 15px 20px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      border-bottom: 1px solid #ddd;
    }

    .action-btn {
      background: white;
      border: 1px solid #ddd;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
    }

    .action-btn:hover {
      background: #0f766e;
      color: white;
      border-color: #0f766e;
    }

    /* Scrollbar */
    .chat-messages::-webkit-scrollbar {
      width: 8px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #0f766e;
      border-radius: 4px;
    }

    .chat-messages::-webkit-scrollbar-thumb:hover {
      background: #14b8a6;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .message-content {
        max-width: 85% !important;
      }

      .chatbot-header {
        padding: 15px;
      }

      .header-title h2 {
        font-size: 18px;
      }

      .header-actions button {
        padding: 6px 12px;
        font-size: 12px;
        margin-left: 5px;
      }

      .chat-messages {
        padding: 15px;
        gap: 12px;
      }

      .chat-input-area {
        padding: 15px;
      }

      .quick-actions {
        padding: 10px 15px;
      }

      .action-btn {
        padding: 6px 12px;
        font-size: 12px;
      }
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 10px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.5;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }

    .info-box {
      background: #e3f2fd;
      border-left: 4px solid #2196F3;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #1565c0;
      margin: 10px 0;
    }

    .warning-box {
      background: #fff3e0;
      border-left: 4px solid #f57c00;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #e65100;
      margin: 10px 0;
    }

    .error-box {
      background: #ffebee;
      border-left: 4px solid #c62828;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #c62828;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="chatbot-container">
    <!-- Header -->
    <div class="chatbot-header">
      <div class="header-title">
        <h2>🤖 AI Health Assistant</h2>
        <p>Chat about your health concerns (For emergency, call 911)</p>
      </div>
      <div class="header-actions">
        <button onclick="clearChat()">🗑️ Clear</button>
        <button onclick="endChat()">👋 Exit</button>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="action-btn" onclick="useQuickAction('symptoms')">🩺 My Symptoms</button>
      <button class="action-btn" onclick="useQuickAction('medicine')">💊 Find Medicine</button>
      <button class="action-btn" onclick="useQuickAction('disease')">🏥 About Disease</button>
      <button class="action-btn" onclick="useQuickAction('interaction')">⚠️ Drug Interaction</button>
      <button class="action-btn" onclick="useQuickAction('emergency')">🚨 Emergency?</button>
    </div>

    <!-- Chat Messages -->
    <div class="chat-messages" id="chatMessages">
      <!-- Messages will be added here -->
    </div>

    <!-- Chat Input -->
    <div class="chat-input-area">
      <div class="input-wrapper">
        <input 
          type="text" 
          class="chat-input" 
          id="userInput" 
          placeholder="Type your message... (e.g., 'I have a cough' or 'tell me about paracetamol')"
          onkeypress="handleKeyPress(event)"
        />
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { ChatbotEngine, processUserMessage, initializeChatbot } from './js/chatbot-utils.js';
    import { DISEASE_MEDICINE_DATABASE } from './js/disease-medicine-database.js';

    // Initialize chatbot
    let chatbot = initializeChatbot();
    let isTyping = false;

    // Display initial greeting
    function initializeChat() {
      const greeting = chatbot.startSession();
      addMessage('assistant', greeting, 'normal');
    }

    // Add message to UI
    function addMessage(sender, content, type = 'normal') {
      const messagesDiv = document.getElementById('chatMessages');
      const messageEl = document.createElement('div');
      messageEl.className = `message ${sender}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = sender === 'user' ? '👤' : '🤖';

      const contentEl = document.createElement('div');
      contentEl.className = `message-content ${type === 'emergency' ? 'emergency' : ''} ${type === 'info' ? 'info-message' : ''} ${type === 'warning' ? 'warning-message' : ''}`;
      contentEl.innerHTML = content.replace(/\n/g, '<br>');

      if (sender === 'assistant') {
        messageEl.appendChild(avatar);
        messageEl.appendChild(contentEl);
      } else {
        messageEl.appendChild(contentEl);
        messageEl.appendChild(avatar);
      }

      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      return contentEl;
    }

    // Show typing indicator
    function showTyping() {
      const messagesDiv = document.getElementById('chatMessages');
      const typingEl = document.createElement('div');
      typingEl.className = 'message assistant';
      typingEl.id = 'typingIndicator';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = '🤖';

      const content = document.createElement('div');
      content.className = 'message-content';
      content.innerHTML = `<div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;

      typingEl.appendChild(avatar);
      typingEl.appendChild(content);
      messagesDiv.appendChild(typingEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Remove typing indicator
    function removeTyping() {
      const typingEl = document.getElementById('typingIndicator');
      if (typingEl) typingEl.remove();
    }

    // Send message
    window.sendMessage = async function() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();

      if (!message || isTyping) return;

      isTyping = true;
      input.value = '';

      // Add user message
      addMessage('user', message);

      // Show typing
      showTyping();

      // Simulate delay
      setTimeout(() => {
        removeTyping();

        // Process message
        const response = processUserMessage(chatbot, message);
        addMessage('assistant', response.message, response.type);

        // Add suggestions if available
        if (response.suggestions && response.suggestions.length > 0) {
          const suggestionsHtml = '<div class="suggestions">' +
            response.suggestions.map(s => 
              `<button class="suggestion-btn" onclick="useSuggestion('${s}')">${s}</button>`
            ).join('') +
            '</div>';
          document.querySelectorAll('.message.assistant:last-child .message-content')[0].innerHTML += suggestionsHtml;
        }

        isTyping = false;
      }, 1000 + Math.random() * 500);

      input.focus();
    };

    // Handle Enter key
    window.handleKeyPress = function(event) {
      if (event.key === 'Enter' && !isTyping) {
        sendMessage();
      }
    };

    // Use suggestion
    window.useSuggestion = function(suggestion) {
      document.getElementById('userInput').value = suggestion;
      document.getElementById('userInput').focus();
      setTimeout(() => sendMessage(), 100);
    };

    // Quick actions
    window.useQuickAction = function(action) {
      let message = '';
      switch(action) {
        case 'symptoms':
          message = 'I have some symptoms. Can you help me?';
          break;
        case 'medicine':
          message = 'Can you help me find medicines?';
          break;
        case 'disease':
          message = 'Tell me about a specific disease';
          break;
        case 'interaction':
          message = 'Check if these medicines interact';
          break;
        case 'emergency':
          message = 'I have severe chest pain and can\'t breathe';
          break;
      }
      document.getElementById('userInput').value = message;
      setTimeout(() => sendMessage(), 100);
    };

    // Clear chat
    window.clearChat = function() {
      if (confirm('Are you sure you want to clear the chat?')) {
        document.getElementById('chatMessages').innerHTML = '';
        chatbot.clearHistory();
        initializeChat();
      }
    };

    // End chat
    window.endChat = function() {
      if (confirm('Thank you for using our service. Goodbye!')) {
        addMessage('assistant', chatbot.endSession());
        setTimeout(() => {
          window.location.href = 'patient.html';
        }, 2000);
      }
    };

    // Start chat
    initializeChat();
    document.getElementById('userInput').focus();

    // Check if there's an initial message from patient dashboard
    const initialMessage = localStorage.getItem('initialChatMessage');
    if (initialMessage) {
      setTimeout(() => {
        document.getElementById('userInput').value = initialMessage;
        sendMessage();
        localStorage.removeItem('initialChatMessage');
      }, 500);
    }
  </script>
  <!-- VILGAX AI Assistant - Advanced Version -->
  <script src="js/vilgax-assistant-advanced.js"></script>
  <!-- VILGAX Form Filling Engine -->
  <script src="js/vilgax-form-filler.js"></script>
  <!-- VILGAX Hotword Detection -->
  <script src="js/vilgax-hotword-detector.js"></script>
</body>
</html>
