<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard | Care Without Borders</title>
  <script src="js/i18n.js"></script>
  <script src="js/vilgax-voice-system.js"></script>
  <script src="js/doctor-consultation-panel.js"></script>
  <script src="js/doctor-management.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-cyan: #14b8a6;
      --light-cyan: #06b6d4;
      --dark-bg: #0f172a;
      --card-bg: #1e293b;
      --text-white: #ffffff;
      --text-light: #cbd5e1;
      --border-color: #334155;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
      color: var(--text-light);
      min-height: 100vh;
    }

    /* ==================== NAVBAR ==================== */
    .navbar {
      background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.95));
      border-bottom: 1px solid var(--border-color);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .navbar-brand {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary-cyan);
      cursor: pointer;
    }

    .navbar-menu {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-menu button {
      background: transparent;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .navbar-menu button:hover {
      background: rgba(20,184,166,0.1);
      color: var(--primary-cyan);
    }

    .logout-btn {
      background: linear-gradient(135deg, var(--danger), #dc2626) !important;
      color: white !important;
      padding: 8px 16px !important;
    }

    .logout-btn:hover {
      background: linear-gradient(135deg, #dc2626, #b91c1c) !important;
    }

    /* ==================== MAIN LAYOUT ==================== */
    .dashboard-wrapper {
      display: flex;
      min-height: calc(100vh - 60px);
    }

    .sidebar {
      width: 280px;
      background: rgba(30,41,59,0.5);
      border-right: 1px solid var(--border-color);
      padding: 20px;
      overflow-y: auto;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-cyan), var(--light-cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: var(--dark-bg);
    }

    .sidebar-info h3 {
      color: var(--text-white);
      font-size: 14px;
      margin-bottom: 2px;
    }

    .sidebar-info p {
      color: var(--text-light);
      font-size: 12px;
    }

    .menu-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu-item {
      padding: 12px 15px;
      background: rgba(20,184,166,0.05);
      border: 1.5px solid transparent;
      border-radius: 8px;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
      font-size: 14px;
    }

    .menu-item:hover {
      background: rgba(20,184,166,0.1);
      border-color: var(--primary-cyan);
      color: var(--primary-cyan);
    }

    .menu-item.active {
      background: linear-gradient(135deg, rgba(20,184,166,0.2), rgba(6,182,212,0.1));
      border-color: var(--primary-cyan);
      color: var(--primary-cyan);
    }

    /* ==================== CONTENT AREA ==================== */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .content-header {
      background: rgba(30,41,59,0.5);
      padding: 30px;
      border-bottom: 1px solid var(--border-color);
    }

    .content-header h1 {
      color: var(--text-white);
      font-size: 32px;
      margin-bottom: 8px;
    }

    .content-header p {
      color: var(--text-light);
      font-size: 15px;
    }

    .content-body {
      padding: 30px;
      flex: 1;
    }

    /* ==================== PAGE SECTIONS ==================== */
    .page-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .page-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ==================== CARDS ==================== */
    .card {
      background: rgba(30,41,59,0.7);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: var(--primary-cyan);
      box-shadow: 0 0 20px rgba(20,184,166,0.1);
    }

    .card h2 {
      color: var(--primary-cyan);
      font-size: 20px;
      margin-bottom: 12px;
    }

    .card p {
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 15px;
    }

    /* ==================== STATS GRID ==================== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(20,184,166,0.1), rgba(6,182,212,0.05));
      border: 1px solid var(--border-color);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-number {
      font-size: 28px;
      color: var(--primary-cyan);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .stat-label {
      color: var(--text-light);
      font-size: 13px;
      font-weight: 500;
    }

    /* ==================== APPOINTMENTS TABLE ==================== */
    .appointments-table {
      background: rgba(30,41,59,0.7);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: rgba(20,184,166,0.1);
      color: var(--primary-cyan);
      padding: 15px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 15px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-light);
    }

    tr:hover {
      background: rgba(20,184,166,0.05);
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-pending {
      background: rgba(245,158,11,0.2);
      color: #fbbf24;
    }

    .status-confirmed {
      background: rgba(16,185,129,0.2);
      color: #6ee7b7;
    }

    .status-completed {
      background: rgba(20,184,166,0.2);
      color: var(--light-cyan);
    }

    /* ==================== FORMS ==================== */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: var(--primary-cyan);
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      background: rgba(15,23,42,0.5);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-light);
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary-cyan);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
      background: rgba(20, 184, 166, 0.05);
    }

    /* ==================== BUTTONS ==================== */
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-cyan), var(--light-cyan));
      color: var(--dark-bg);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(20, 184, 166, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary-cyan);
      border: 1.5px solid var(--primary-cyan);
    }

    .btn-secondary:hover {
      background: rgba(20, 184, 166, 0.1);
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 1024px) {
      .sidebar {
        width: 240px;
        padding: 15px;
      }

      .menu-item {
        padding: 10px 12px;
        font-size: 13px;
      }

      .content-body {
        padding: 20px;
      }

      .content-header {
        padding: 20px;
      }

      .content-header h1 {
        font-size: 26px;
      }
    }

    @media (max-width: 768px) {
      .dashboard-wrapper {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        position: static;
        padding: 15px;
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 15px;
      }

      .sidebar-header {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
      }

      .menu-items {
        grid-column: 1 / -1;
        flex-direction: row;
        overflow-x: auto;
        padding: 10px 0;
      }

      .content-header h1 {
        font-size: 22px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px;
      }
    }

    @media (max-width: 480px) {
      .navbar {
        padding: 12px 15px;
      }

      .navbar-brand {
        font-size: 16px;
      }

      .navbar-menu {
        gap: 10px;
      }

      .content-body {
        padding: 15px;
      }

      .card {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <div class="navbar">
    <div class="navbar-brand" onclick="window.location.href='index.html'">🏥 CARE WITHOUT BORDERS</div>
    <div class="navbar-menu">
      <button onclick="switchLanguage()">🌍 Language</button>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <!-- MAIN WRAPPER -->
  <div class="dashboard-wrapper">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-avatar">👨‍⚕️</div>
        <div class="sidebar-info">
          <h3 id="doctorSidebarName">Doctor Profile</h3>
          <p id="doctorSidebarSpecialty">Verified Physician</p>
          <button onclick="openDoctorProfileModal()" style="margin-top: 8px; padding: 4px 8px; background: var(--primary-cyan); border: none; border-radius: 4px; color: var(--dark-bg); font-weight: 600; cursor: pointer; font-size: 11px;">✏️ Edit</button>
        </div>
      </div>

      <div class="menu-items">
        <div class="menu-item active" onclick="switchPage('dashboard')">📊 Dashboard</div>
        <div class="menu-item" onclick="switchPage('consultations')">💬 Consultations</div>
        <div class="menu-item" onclick="switchPage('patients')">👥 Patients</div>
        <div class="menu-item" onclick="switchPage('prescriptions')">💊 Prescriptions</div>
        <div class="menu-item" onclick="switchPage('earnings')">💰 Earnings</div>
        <div class="menu-item" onclick="switchPage('settings')">⚙️ Settings</div>
      </div>
    </div>

    <!-- CONTENT AREA -->
    <div class="content-area">
      <!-- HEADER -->
      <div class="content-header">
        <h1 id="pageTitle">Welcome Back! 👋</h1>
        <p id="pageSubtitle">Here's your medical practice overview</p>
      </div>

      <!-- BODY -->
      <div class="content-body">
        <!-- DASHBOARD PAGE -->
        <div id="dashboard" class="page-section active">
          <div id="dashboardContent"></div>
        </div>

        <!-- CONSULTATIONS PAGE -->
        <div id="consultations" class="page-section">
          <div id="consultationsContent"></div>
        </div>

        <!-- PATIENTS PAGE -->
        <div id="patients" class="page-section">
          <div id="patientsContent"></div>
        </div>

        <!-- PRESCRIPTIONS PAGE -->
        <div id="prescriptions" class="page-section">
          <div id="prescriptionsContent"></div>
        </div>

        <!-- EARNINGS PAGE -->
        <div id="earnings" class="page-section">
          <div id="earningsContent"></div>
        </div>

        <!-- SETTINGS PAGE -->
        <div id="settings" class="page-section">
          <div class="card">
            <h2>⚙️ Practice Settings</h2>
            <p>Update your profile and preferences</p>
            <div class="form-group">
              <label>Specialization</label>
              <select>
                <option>General Physician</option>
                <option>Cardiologist</option>
                <option>Dermatologist</option>
                <option>Pediatrician</option>
              </select>
            </div>
            <div class="form-group">
              <label>Clinic Address</label>
              <input type="text" placeholder="Enter clinic address">
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" placeholder="Enter phone number">
            </div>
            <button class="btn btn-primary">💾 Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function switchPage(pageName) {
      document.querySelectorAll('.page-section').forEach(section => {
        section.classList.remove('active');
      });

      document.querySelectorAll('.menu-item').forEach(item => {
        item.classList.remove('active');
      });

      const pageEl = document.getElementById(pageName);
      if (pageEl) {
        pageEl.classList.add('active');
      }

      event.target.closest('.menu-item').classList.add('active');

      const headers = {
        dashboard: ['Welcome Back! 👋', 'Here\'s your medical practice overview'],
        consultations: ['💬 Consultation Management', 'Manage patient consultation requests and provide diagnosis'],
        patients: ['👥 My Patients', 'Manage your patient database and medical records'],
        prescriptions: ['💊 Issue Prescriptions', 'Create and manage patient prescriptions'],
        earnings: ['💰 Earnings & Revenue', 'Track your earnings and consultation revenue'],
        reports: ['📈 Performance Reports', 'View your practice statistics and analytics'],
        settings: ['⚙️ Practice Settings', 'Update your profile and preferences']
      };

      const header = headers[pageName] || ['Dashboard', ''];
      document.getElementById('pageTitle').textContent = header[0];
      document.getElementById('pageSubtitle').textContent = header[1];

      // Load dynamic content based on page
      if (pageName === 'dashboard' && window.getDoctorDashboardHTML) {
        document.getElementById('dashboardContent').innerHTML = window.getDoctorDashboardHTML();
      } else if (pageName === 'consultations' && window.getConsultationsHTML) {
        document.getElementById('consultationsContent').innerHTML = window.getConsultationsHTML();
      } else if (pageName === 'patients' && window.getPatientListHTML) {
        document.getElementById('patientsContent').innerHTML = window.getPatientListHTML();
      } else if (pageName === 'prescriptions' && window.getPrescriptionsHTML) {
        document.getElementById('prescriptionsContent').innerHTML = window.getPrescriptionsHTML();
      } else if (pageName === 'earnings' && window.getEarningsHTML) {
        document.getElementById('earningsContent').innerHTML = window.getEarningsHTML();
      } else if (pageName === 'appointments' && window.doctorPanel) {
        const requestsDiv = document.getElementById('consultationRequests');
        if (requestsDiv) {
          requestsDiv.innerHTML = showDoctorConsultationRequests('General');
        }
      }
    }

    function switchLanguage() {
      if (window.vilgaxVoiceSystem) {
        const currentLang = window.vilgaxVoiceSystem.currentLanguage;
        const nextLang = currentLang === 'en' ? 'ta' : currentLang === 'ta' ? 'hi' : 'en';
        window.vilgaxVoiceSystem.setLanguage(nextLang);
        const langNames = { en: '🇺🇸 English', ta: '🇮🇳 Tamil', hi: '🇮🇳 Hindi' };
        alert(`Language changed to: ${langNames[nextLang]}`);
      }
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('doctorLoggedIn');
        window.location.href = 'index.html';
      }
    }

    // ==================== DOCTOR PROFILE FUNCTIONS ====================
    function openDoctorProfileModal() {
      // Load existing doctor profile data
      const doctorData = JSON.parse(localStorage.getItem('doctorData') || '{}');
      const profileData = JSON.parse(localStorage.getItem('doctorProfile') || '{}');
      
      document.getElementById('doctorProfileName').value = profileData.name || doctorData.name || '';
      document.getElementById('doctorProfileEmail').value = profileData.email || doctorData.email || '';
      document.getElementById('doctorProfilePhone').value = profileData.phone || doctorData.phone || '';
      document.getElementById('doctorProfileSpecialty').value = profileData.specialty || doctorData.specialty || '';
      document.getElementById('doctorProfileLicense').value = profileData.license || doctorData.license || '';
      document.getElementById('doctorProfileExperience').value = profileData.experience || doctorData.experience || '';
      document.getElementById('doctorProfileQualification').value = profileData.qualification || '';
      document.getElementById('doctorProfileBio').value = profileData.bio || '';
      document.getElementById('doctorProfileClinicAddress').value = profileData.clinicAddress || '';
      document.getElementById('doctorProfileConsultationFee').value = profileData.consultationFee || '';
      
      document.getElementById('doctorProfileModal').style.display = 'flex';
    }

    function closeDoctorProfileModal() {
      document.getElementById('doctorProfileModal').style.display = 'none';
    }

    function saveDoctorProfile(event) {
      event.preventDefault();
      
      const profile = {
        name: document.getElementById('doctorProfileName').value,
        email: document.getElementById('doctorProfileEmail').value,
        phone: document.getElementById('doctorProfilePhone').value,
        specialty: document.getElementById('doctorProfileSpecialty').value,
        license: document.getElementById('doctorProfileLicense').value,
        experience: document.getElementById('doctorProfileExperience').value,
        qualification: document.getElementById('doctorProfileQualification').value,
        bio: document.getElementById('doctorProfileBio').value,
        clinicAddress: document.getElementById('doctorProfileClinicAddress').value,
        consultationFee: document.getElementById('doctorProfileConsultationFee').value,
        updatedAt: new Date().toISOString()
      };
      
      // Save to localStorage
      localStorage.setItem('doctorProfile', JSON.stringify(profile));
      
      // Update sidebar display
      document.getElementById('doctorSidebarName').textContent = profile.name || 'Doctor Profile';
      document.getElementById('doctorSidebarSpecialty').textContent = profile.specialty || 'Verified Physician';
      
      alert('✅ Profile saved successfully!');
      closeDoctorProfileModal();
    }

    window.addEventListener('DOMContentLoaded', () => {
      console.log('✓ Doctor Dashboard loaded');
      // Load initial dashboard content
      if (window.getDoctorDashboardHTML) {
        document.getElementById('dashboardContent').innerHTML = window.getDoctorDashboardHTML();
      }
      
      // Load doctor profile data on page load
      const doctorData = JSON.parse(localStorage.getItem('doctorData') || '{}');
      const profileData = JSON.parse(localStorage.getItem('doctorProfile') || '{}');
      if (doctorData.name) {
        document.getElementById('doctorSidebarName').textContent = profileData.name || doctorData.name;
        document.getElementById('doctorSidebarSpecialty').textContent = profileData.specialty || doctorData.specialty || 'Verified Physician';
      }
    });
  </script>

  <!-- ==================== DOCTOR PROFILE EDITOR MODAL ==================== -->
  <div id="doctorProfileModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; backdrop-filter: blur(5px); animation: fadeIn 0.3s ease; align-items: center; justify-content: center;">
    <div style="background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid #334155; border-radius: 16px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5);">
      
      <!-- Header -->
      <div style="background: linear-gradient(135deg, #14b8a6, #06b6d4); padding: 20px; border-radius: 16px 16px 0 0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0;">
        <h2 style="color: #0f172a; margin: 0; font-size: 22px;">👨‍⚕️ Edit Doctor Profile</h2>
        <button onclick="closeDoctorProfileModal()" style="background: rgba(0,0,0,0.2); border: none; color: #0f172a; cursor: pointer; font-size: 24px; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">✕</button>
      </div>

      <!-- Form Content -->
      <div style="padding: 25px;">
        <form id="doctorProfileForm" onsubmit="saveDoctorProfile(event)">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
              <label style="color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px;">Full Name *</label>
              <input type="text" id="doctorProfileName" placeholder="Dr. Full Name" required style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: inherit;">
            </div>
            <div>
              <label style="color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px;">Email *</label>
              <input type="email" id="doctorProfileEmail" placeholder="doctor@example.com" required style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: inherit;">
            </div>
            <div>
              <label style="color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px;">Phone</label>
              <input type="tel" id="doctorProfilePhone" placeholder="+91-9876543210" style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: inherit;">
            </div>
            <div>
              <label style="color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px;">Specialization *</label>
              <input type="text" id="doctorProfileSpecialty" placeholder="e.g., Cardiologist" required style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: inherit;">
            </div>
            <div>
              <label style="color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px;">Medical License</label>
              <input type="text" id="doctorProfileLicense" placeholder="License Number" style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: inherit;">
            </div>
            <div>
              <label style="color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px;">Experience (Years)</label>
              <input type="number" id="doctorProfileExperience" placeholder="e.g., 15" min="0" max="70" style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: inherit;">
            </div>
          </div>

          <div style="margin-bottom: 20px;">
            <label style="color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px;">Qualifications</label>
            <textarea id="doctorProfileQualification" placeholder="e.g., MBBS, MD (Cardiology), FACC" style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: inherit; min-height: 70px; resize: none;"></textarea>
          </div>

          <div style="margin-bottom: 20px;">
            <label style="color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px;">Professional Bio</label>
            <textarea id="doctorProfileBio" placeholder="Write a brief professional bio..." style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: inherit; min-height: 80px; resize: none;"></textarea>
          </div>

          <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
              <label style="color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px;">Clinic Address</label>
              <textarea id="doctorProfileClinicAddress" placeholder="Full clinic/hospital address" style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: inherit; min-height: 70px; resize: none;"></textarea>
            </div>
            <div>
              <label style="color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px;">Consultation Fee (₹)</label>
              <input type="number" id="doctorProfileConsultationFee" placeholder="e.g., 500" min="0" style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; border-radius: 8px; color: #cbd5e1; font-family: inherit;">
            </div>
          </div>

          <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 1; padding: 12px; background: linear-gradient(135deg, #14b8a6, #06b6d4); border: none; border-radius: 8px; color: #0f172a; font-weight: 600; cursor: pointer; transition: all 0.3s ease;">
              💾 Save Profile
            </button>
            <button type="button" onclick="closeDoctorProfileModal()" style="flex: 1; padding: 12px; background: transparent; border: 1.5px solid #14b8a6; color: #14b8a6; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

</body>
</html>
