<!DOCTYPE html>
<html>
<head>
  <title>Doctor Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <h1>Care Without Borders - Doctor</h1>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- Appointments -->
  <div class="card">
    <h2>Appointments</h2>
    <div id="appointmentsList">
      <p>No appointments yet.</p>
    </div>
  </div>

  <!-- Start Video Call -->
  <div class="card">
    <h2>Start Video Consultation</h2>
    <input type="text" id="roomName" placeholder="Enter Room Name">
    <button onclick="startCall()">Start Call</button>
    <div id="jitsiContainer" style="margin-top:10px;"></div>
  </div>

  <!-- Add EHR -->
  <div class="card">
    <h2>Add / Update EHR</h2>
    <input type="text" id="patientId" placeholder="Patient ID">
    <input type="text" id="diagnosis" placeholder="Diagnosis">
    <input type="text" id="prescription" placeholder="Prescription">
    <button id="saveEhrBtn">Save Record</button>
  </div>

  <!-- Patient Records -->
  <div class="card">
    <h2>Patient Records</h2>
    <div id="ehrList">
      <p>No records available.</p>
    </div>
  </div>

</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script type="module" src="js/doctor.js"></script>
</body>
</html>
