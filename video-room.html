<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Consultation | Care Without Borders</title>
  <!-- Multilingual Support - Load First! -->
  <script src="js/i18n.js"></script>
  <!-- Modern UI Redesign -->
  <link rel="stylesheet" href="css/theme-redesign.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .video-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .video-header {
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      color: white;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .video-info h2 {
      margin: 0 0 10px 0;
      font-size: 24px;
    }

    .session-timer {
      background: rgba(255, 255, 255, 0.2);
      padding: 10px 15px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 18px;
    }

    .video-content {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
      margin-bottom: 30px;
    }

    .video-frame {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
    }

    #jitsi-container {
      width: 100%;
      height: 100%;
    }

    .video-placeholder {
      color: #666;
      font-size: 18px;
      text-align: center;
    }

    .video-stream {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px 25px;
      border-radius: 50px;
      z-index: 10;
    }

    .control-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #0f766e;
      color: white;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      background: #14b8a6;
      transform: scale(1.1);
    }

    .control-btn.disabled {
      background: #999;
      cursor: not-allowed;
    }

    .control-btn.end-call {
      background: #dc2626;
    }

    .control-btn.end-call:hover {
      background: #b91c1c;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .pricing-card {
      background: white;
      border: 2px solid #0f766e;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .pricing-card h3 {
      margin: 0 0 15px 0;
      color: #0f766e;
      font-size: 18px;
    }

    .price-display {
      font-size: 32px;
      font-weight: bold;
      color: #0f766e;
      margin-bottom: 10px;
    }

    .duration {
      color: #666;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .pay-btn {
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      width: 100%;
      transition: all 0.3s ease;
    }

    .pay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(15, 118, 110, 0.3);
    }

    .pay-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .doctor-info {
      background: white;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }

    .doctor-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
    }

    .doctor-name {
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    .doctor-specialty {
      color: #666;
      font-size: 12px;
    }

    .chat-section {
      background: white;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      height: 300px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-message {
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
    }

    .chat-message.patient {
      background: #e8f5f4;
      align-self: flex-end;
      max-width: 80%;
      color: #0f766e;
    }

    .chat-message.doctor {
      background: #f0f0f0;
      align-self: flex-start;
      max-width: 80%;
      color: #333;
    }

    .chat-input {
      display: flex;
      gap: 5px;
    }

    .chat-input input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
    }

    .chat-input button {
      background: #0f766e;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 10px;
      background: #4caf50;
      color: white;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 15px;
    }

    .message-alert {
      padding: 15px;
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      border-radius: 4px;
      margin-bottom: 15px;
      color: #856404;
    }

    /* Video Room Enhancements */
    #appointment-details-banner {
      font-size: 14px;
    }

    #appointment-details-banner strong {
      color: #0f766e;
    }

    .room-controls {
      display: none;
      gap: 10px;
      flex-direction: row;
      flex-wrap: wrap;
      padding: 10px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .room-controls .control-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      background: #0f766e;
      color: white;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .room-controls .control-btn:hover {
      background: #14b8a6;
      transform: scale(1.1);
    }

    .room-controls .control-btn.disabled {
      background: #999;
      cursor: not-allowed;
    }

    .room-controls .control-btn.end-call {
      background: #dc2626;
    }

    .room-controls .control-btn.end-call:hover {
      background: #b91c1c;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      background: #ffc107;
      color: #333;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .status-badge.status-connected {
      background: #4caf50;
      color: white;
    }

    .status-badge.status-disconnected {
      background: #dc2626;
      color: white;
    }

    .participant-item {
      background: #f9f9f9;
      padding: 10px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }

    .participant-avatar {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
    }

    .participant-info {
      flex: 1;
      min-width: 0;
    }

    .participant-name {
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .participant-status {
      color: #999;
      font-size: 11px;
    }

    .symptom-badge {
      display: inline-block;
      background: #e8f5f4;
      color: #0f766e;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-right: 5px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .video-content {
        grid-template-columns: 1fr;
      }

      .sidebar {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .doctor-info,
      .chat-section {
        flex: 1;
        min-width: 200px;
      }

      .room-controls {
        flex-direction: row;
        justify-content: space-around;
      }

      .room-controls .control-btn {
        flex: 1;
      }

      #appointment-details-banner {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="video-container">
    <!-- Video Header -->
    <div class="video-header">
      <div class="video-info">
        <h2>📞 Video Consultation</h2>
        <div id="connection-status" class="status-badge">🟠 Connecting...</div>
      </div>
      <div class="session-timer">
        Duration: <span id="call-duration">0:00</span>
      </div>
    </div>

    <!-- Error Message -->
    <div id="error-message" class="message-alert" style="display: none;"></div>

    <!-- Appointment Details -->
    <div id="appointment-details-banner" style="background: #f0f9ff; border: 1px solid #0f766e; border-radius: 8px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
      <div>
        <strong id="video-patient-name">Patient Name</strong> • <span id="video-appointment-time">Date & Time</span>
      </div>
      <div>
        <span id="video-symptoms" style="margin-right: 15px;"></span>
        Consultation Fee: <strong id="video-consultation-fee">₹500</strong>
      </div>
    </div>

    <!-- Main Video Content -->
    <div class="video-content">
      <!-- Jitsi Container -->
      <div class="video-frame" id="jitsi-container"></div>

      <!-- Sidebar Controls -->
      <div class="sidebar">
        <!-- Room Controls -->
        <div id="room-controls" class="room-controls" style="display: none; gap: 10px; flex-direction: row; flex-wrap: wrap;">
          <button class="control-btn" id="toggle-audio-btn" onclick="window.videoRoomManager.toggleAudio()" title="Toggle Audio">🎤</button>
          <button class="control-btn" id="toggle-video-btn" onclick="window.videoRoomManager.toggleVideo()" title="Toggle Video">📹</button>
          <button class="control-btn end-call" id="end-call-btn" onclick="window.videoRoomManager.endCall()" title="End Call">📞</button>
        </div>

        <!-- Pre-join Countdown -->
        <div id="pre-join-countdown" style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px; color: #0f766e; font-weight: 600;">
          Joining in 5s...
        </div>

        <!-- Doctor/Patient Info -->
        <div class="doctor-info">
          <div class="doctor-avatar">👨‍⚕️</div>
          <div class="doctor-name" id="video-doctor-name">Doctor Name</div>
          <div class="doctor-specialty">Medical Specialist</div>
          <div style="margin-top: 10px; font-size: 12px; color: #999;">
            <span id="participant-role" style="display: block; margin-top: 5px; font-weight: 600; color: #0f766e;">Patient</span>
          </div>
        </div>

        <!-- Participant List -->
        <div id="participant-list" style="display: flex; flex-direction: column; gap: 10px;"></div>

        <!-- Chat Section -->
        <div class="chat-section">
          <h4 style="margin: 0 0 10px 0; color: #0f766e;">💬 Chat</h4>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Type message..." />
            <button onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Call Ended Message -->
    <div id="call-ended-message" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 1000; text-align: center;"></div>
  </div>

  <!-- Jitsi Script -->
  <script src="https://meet.jit.si/external_api.js"></script>
  
  <!-- Video Room Manager -->
  <script src="js/video-room-manager.js"></script>

  <!-- Module Initialization -->
  <script type="module">
    import { auth, db } from './js/firebase.js';
    import AppointmentBookingEngine, { initAppointmentBookingEngine } from './js/appointment-booking.js';
    
    // Wait for Firebase and appointment engine to be ready
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      // Initialize appointment booking engine
      if (!window.appointmentBookingEngine) {
        try {
          const engine = await initAppointmentBookingEngine();
          window.appointmentBookingEngine = engine;
        } catch (error) {
          console.error('Error initializing appointment engine:', error);
        }
      }
    });
  </script>

  <!-- Chat and utilities -->
  <script>
    // Send Chat Message
    window.sendMessage = function() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      
      if (message) {
        const messagesDiv = document.getElementById('chatMessages');
        const msgEl = document.createElement('div');
        msgEl.className = 'chat-message patient';
        msgEl.textContent = message;
        messagesDiv.appendChild(msgEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        input.value = '';
      }
    };

    // Allow Enter key to send message
    document.addEventListener('DOMContentLoaded', () => {
      const chatInput = document.getElementById('chatInput');
      if (chatInput) {
        chatInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            window.sendMessage();
          }
        });
      }
    });
  </script>
</body>
</html>
