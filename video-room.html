<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Consultation | Care Without Borders</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .video-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .video-header {
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      color: white;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .video-info h2 {
      margin: 0 0 10px 0;
      font-size: 24px;
    }

    .session-timer {
      background: rgba(255, 255, 255, 0.2);
      padding: 10px 15px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 18px;
    }

    .video-content {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      margin-bottom: 30px;
    }

    .video-frame {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-placeholder {
      color: #666;
      font-size: 18px;
      text-align: center;
    }

    .video-stream {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px 25px;
      border-radius: 50px;
      z-index: 10;
    }

    .control-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #0f766e;
      color: white;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      background: #14b8a6;
      transform: scale(1.1);
    }

    .control-btn.disabled {
      background: #999;
      cursor: not-allowed;
    }

    .control-btn.end-call {
      background: #dc2626;
    }

    .control-btn.end-call:hover {
      background: #b91c1c;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .pricing-card {
      background: white;
      border: 2px solid #0f766e;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .pricing-card h3 {
      margin: 0 0 15px 0;
      color: #0f766e;
      font-size: 18px;
    }

    .price-display {
      font-size: 32px;
      font-weight: bold;
      color: #0f766e;
      margin-bottom: 10px;
    }

    .duration {
      color: #666;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .pay-btn {
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      width: 100%;
      transition: all 0.3s ease;
    }

    .pay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(15, 118, 110, 0.3);
    }

    .pay-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .doctor-info {
      background: white;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }

    .doctor-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
    }

    .doctor-name {
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    .doctor-specialty {
      color: #666;
      font-size: 12px;
    }

    .chat-section {
      background: white;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      height: 300px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-message {
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
    }

    .chat-message.patient {
      background: #e8f5f4;
      align-self: flex-end;
      max-width: 80%;
      color: #0f766e;
    }

    .chat-message.doctor {
      background: #f0f0f0;
      align-self: flex-start;
      max-width: 80%;
      color: #333;
    }

    .chat-input {
      display: flex;
      gap: 5px;
    }

    .chat-input input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
    }

    .chat-input button {
      background: #0f766e;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 10px;
      background: #4caf50;
      color: white;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 15px;
    }

    .message-alert {
      padding: 15px;
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      border-radius: 4px;
      margin-bottom: 15px;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <div class="video-header">
      <div class="video-info">
        <h2>📞 Video Consultation</h2>
        <div class="status-badge" id="callStatus">Waiting for payment...</div>
      </div>
      <div class="session-timer">
        Time Remaining: <span id="sessionTimer">15:00</span>
      </div>
    </div>

    <div class="message-alert" id="messageAlert" style="display: none;"></div>

    <div class="video-content">
      <div class="video-frame">
        <video id="localVideo" class="video-stream" autoplay muted playsinline></video>
        <video id="remoteVideo" class="video-stream" autoplay playsinline style="display: none;"></video>
        <div class="video-placeholder" id="videoPlaceholder">
          Click "Start Consultation" to begin
        </div>
        <div class="controls" id="controls" style="display: none;">
          <button class="control-btn" id="toggleAudio" title="Toggle Audio">🎤</button>
          <button class="control-btn" id="toggleVideo" title="Toggle Video">📹</button>
          <button class="control-btn end-call" id="endCall" title="End Call">📞</button>
        </div>
      </div>

      <div class="sidebar">
        <div class="pricing-card">
          <h3>💰 Consultation Fee</h3>
          <div class="price-display" id="priceDisplay">₹5</div>
          <div class="duration">for 15 minutes</div>
          <button class="pay-btn" id="paymentBtn" onclick="initiatePayment()">Start Consultation</button>
          <div id="paymentStatus" style="margin-top: 10px; font-size: 12px; color: #666;"></div>
        </div>

        <div class="doctor-info">
          <div class="doctor-avatar" id="doctorAvatar">👨‍⚕️</div>
          <div class="doctor-name" id="doctorName">Dr. Name</div>
          <div class="doctor-specialty" id="doctorSpecialty">Medical Specialist</div>
        </div>

        <div class="chat-section">
          <h4 style="margin: 0 0 10px 0; color: #0f766e;">Chat</h4>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Type message..." />
            <button onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initiateVideoCallPayment, showPaymentAlert, PRICING, formatAmount } from './js/razorpay.js';
    import { auth } from './js/firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    let paymentCompleted = false;
    let sessionStartTime = null;
    let timerInterval = null;
    let audioEnabled = true;
    let videoEnabled = true;
    let localStream = null;

    // Check authentication
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        loadDoctorInfo();
      }
    });

    // Get URL parameters
    function getUrlParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    // Load doctor information
    function loadDoctorInfo() {
      const doctorId = getUrlParam('doctorId');
      const doctorName = getUrlParam('doctorName') || 'Dr. Healthcare Professional';
      const specialty = getUrlParam('specialty') || 'Medical Specialist';

      document.getElementById('doctorName').textContent = doctorName;
      document.getElementById('doctorSpecialty').textContent = specialty;
    }

    // Initiate Payment
    window.initiatePayment = async function() {
      const patientId = auth.currentUser.uid;
      const patientEmail = auth.currentUser.email;
      const patientName = auth.currentUser.displayName || 'Patient';
      const doctorId = getUrlParam('doctorId') || 'default_doctor';

      try {
        document.getElementById('paymentBtn').disabled = true;
        document.getElementById('paymentStatus').textContent = 'Processing...';
        
        await initiateVideoCallPayment(patientId, patientEmail, patientName, doctorId);
      } catch (error) {
        console.error('Payment error:', error);
        document.getElementById('paymentBtn').disabled = false;
        document.getElementById('paymentStatus').textContent = 'Payment failed. Try again.';
      }
    };

    // Payment success callback (called from razorpay.js)
    window.onPaymentSuccess = function() {
      paymentCompleted = true;
      document.getElementById('paymentBtn').textContent = '✅ Consultation Started';
      document.getElementById('paymentBtn').disabled = true;
      document.getElementById('callStatus').textContent = 'Active Call';
      document.getElementById('callStatus').style.background = '#4caf50';
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('videoPlaceholder').style.display = 'none';
      
      startVideoCall();
      startSessionTimer();
    };

    // Start video call
    async function startVideoCall() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: true,
          video: { width: { ideal: 1280 }, height: { ideal: 720 } }
        });

        document.getElementById('localVideo').srcObject = localStream;
        showMessage('📹 Camera and microphone enabled', 'info');
      } catch (error) {
        console.error('Error accessing media:', error);
        showMessage('❌ Camera/Microphone access denied', 'error');
      }
    }

    // Start session timer
    function startSessionTimer() {
      sessionStartTime = Date.now();
      const sessionDuration = PRICING.VIDEO_CALL_15_MIN.duration * 60 * 1000; // 15 minutes in ms

      timerInterval = setInterval(() => {
        const elapsed = Date.now() - sessionStartTime;
        const remaining = Math.max(0, sessionDuration - elapsed);
        
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        
        document.getElementById('sessionTimer').textContent = 
          `${minutes}:${seconds.toString().padStart(2, '0')}`;

        if (remaining <= 0) {
          clearInterval(timerInterval);
          endCall();
        }
      }, 1000);
    }

    // Toggle Audio
    document.getElementById('toggleAudio').addEventListener('click', function() {
      audioEnabled = !audioEnabled;
      if (localStream) {
        localStream.getAudioTracks().forEach(track => {
          track.enabled = audioEnabled;
        });
        this.style.opacity = audioEnabled ? '1' : '0.5';
        this.textContent = audioEnabled ? '🎤' : '🔇';
      }
    });

    // Toggle Video
    document.getElementById('toggleVideo').addEventListener('click', function() {
      videoEnabled = !videoEnabled;
      if (localStream) {
        localStream.getVideoTracks().forEach(track => {
          track.enabled = videoEnabled;
        });
        this.style.opacity = videoEnabled ? '1' : '0.5';
        this.textContent = videoEnabled ? '📹' : '📹❌';
      }
    });

    // End Call
    document.getElementById('endCall').addEventListener('click', endCall);

    function endCall() {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }
      clearInterval(timerInterval);
      document.getElementById('callStatus').textContent = 'Call Ended';
      document.getElementById('callStatus').style.background = '#dc2626';
      document.getElementById('controls').style.display = 'none';
      showMessage('Call ended. Thank you for using our service!', 'success');
      setTimeout(() => {
        window.location.href = 'patient.html';
      }, 2000);
    }

    // Send Chat Message
    window.sendMessage = function() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      
      if (message) {
        const messagesDiv = document.getElementById('chatMessages');
        const msgEl = document.createElement('div');
        msgEl.className = 'chat-message patient';
        msgEl.textContent = message;
        messagesDiv.appendChild(msgEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        input.value = '';
      }
    };

    // Show Message
    function showMessage(msg, type) {
      const alert = document.getElementById('messageAlert');
      alert.textContent = msg;
      alert.style.display = 'block';
      alert.style.background = type === 'error' ? '#f8d7da' : type === 'info' ? '#d1ecf1' : '#d4edda';
      alert.style.borderLeftColor = type === 'error' ? '#dc3545' : type === 'info' ? '#17a2b8' : '#28a745';
      alert.style.color = type === 'error' ? '#721c24' : type === 'info' ? '#0c5460' : '#155724';
    }
  </script>
</body>
</html>
