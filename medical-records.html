<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Records - Care Without Borders</title>
    <!-- Multilingual Support - Load First! -->
    <script src="js/i18n.js"></script>
    <!-- Audio System -->
    <script src="js/audio.js"></script>
    <!-- VILGAX Commander - Full-Featured AI Command Handler -->
    <script src="js/vilgax-commander.js"></script>
    <!-- VILGAX UI - Interactive Voice Interface -->
    <script src="js/vilgax-ui.js"></script>
    <!-- Modern UI Redesign -->
    <link rel="stylesheet" href="css/theme-redesign.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .records-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .upload-section {
            background: white;
            border: 2px dashed #4CAF50;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        .upload-section input[type="file"] {
            display: none;
        }
        .upload-btn {
            background: #4CAF50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 10px 5px;
        }
        .upload-btn:hover {
            background: #45a049;
        }
        .record-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .record-info {
            flex: 1;
        }
        .record-info h4 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .record-info p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }
        .record-actions {
            display: flex;
            gap: 10px;
        }
        .record-actions a,
        .record-actions button {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        .download-btn {
            background: #2196F3;
            color: white;
        }
        .download-btn:hover {
            background: #0b7dda;
        }
        .delete-btn {
            background: #f44336;
            color: white;
        }
        .delete-btn:hover {
            background: #da190b;
        }
        .no-records {
            text-align: center;
            padding: 40px;
            color: #666;
            background: white;
            border-radius: 8px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .file-type {
            display: inline-block;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin-left: 10px;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <h1 data-i18n="brand.name">Care Without Borders</h1>
            <div class="nav-links">
                <a href="patient.html" data-i18n="navigation.dashboard">Dashboard</a>
                <a href="medicine-finder.html" data-i18n="navigation.medicineFinder">Medicine Finder</a>
                <a href="chatbot.html" data-i18n="navigation.aiAssistant">AI Assistant</a>
                <a href="prescription.html" data-i18n="navigation.prescriptions">Prescriptions</a>
                <a href="medical-records.html" class="active" data-i18n="navigation.medicalRecords">Medical Records</a>
                <a href="#" onclick="logout()" data-i18n="navigation.logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="records-container">
        <h2 data-i18n="pages.medicalRecords.myMedicalRecords">My Medical Records</h2>
        <div class="success-message" id="successMessage" data-i18n="pages.medicalRecords.uploadedSuccessfully">File uploaded successfully!</div>
        
        <div class="upload-section">
            <h3 data-i18n="pages.medicalRecords.uploadFile">Upload Medical Record</h3>
            <p data-i18n="pages.medicalRecords.supportedFormats">Supported formats: PDF, JPG, PNG (Max 10MB)</p>
            <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" />
            <button class="upload-btn" onclick="triggerFileUpload()" data-i18n="buttons.chooseFile">Choose File</button>
            <button class="upload-btn" onclick="uploadFile()" style="background: #4CAF50;" data-i18n="buttons.upload">Upload</button>
        </div>

        <div id="recordsList"></div>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase.js';
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
        import { collection, addDoc, getDocs, query, where, deleteDoc, doc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const storage = getStorage();

        async function loadRecords() {
            const recordsList = document.getElementById('recordsList');
            
            try {
                const user = auth.currentUser;
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                recordsList.innerHTML = '<div class="loading">Loading records...</div>';

                const q = query(collection(db, 'medicalRecords'), where('patientId', '==', user.uid));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    recordsList.innerHTML = '<div class="no-records">No medical records uploaded yet.</div>';
                    return;
                }

                recordsList.innerHTML = '';
                snapshot.forEach(docSnapshot => {
                    const data = docSnapshot.data();
                    const uploadDate = data.uploadDate?.toDate ? data.uploadDate.toDate().toLocaleDateString() : new Date(data.uploadDate).toLocaleDateString();
                    
                    const recordHTML = `
                        <div class="record-card">
                            <div class="record-info">
                                <h4>${data.fileName}</h4>
                                <p>Uploaded: ${uploadDate}</p>
                                <p>Type: ${data.fileType || 'N/A'}</p>
                            </div>
                            <div class="record-actions">
                                <a href="${data.downloadUrl}" class="download-btn" target="_blank">Download</a>
                                <button class="delete-btn" onclick="deleteRecord('${docSnapshot.id}', '${data.filePath}')">Delete</button>
                            </div>
                        </div>
                    `;
                    
                    recordsList.innerHTML += recordHTML;
                });
            } catch (error) {
                console.error('Error loading records:', error);
                recordsList.innerHTML = '<div class="no-records">Error loading records. Please try again.</div>';
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                alert('Please select a file first');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                alert('File size must be less than 10MB');
                return;
            }

            try {
                const user = auth.currentUser;
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                const timestamp = Date.now();
                const fileName = `${timestamp}_${file.name}`;
                const filePath = `medical-records/${user.uid}/${fileName}`;
                const storageRef = ref(storage, filePath);

                // Upload to Firebase Storage
                await uploadBytes(storageRef, file);
                const downloadUrl = await getDownloadURL(storageRef);

                // Save metadata to Firestore
                await addDoc(collection(db, 'medicalRecords'), {
                    patientId: user.uid,
                    fileName: file.name,
                    fileType: file.type,
                    filePath: filePath,
                    fileSize: file.size,
                    downloadUrl: downloadUrl,
                    uploadDate: Timestamp.now()
                });

                document.getElementById('successMessage').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);

                fileInput.value = '';
                loadRecords();
            } catch (error) {
                console.error('Error uploading file:', error);
                alert('Error uploading file: ' + error.message);
            }
        }

        async function deleteRecord(recordId, filePath) {
            if (!confirm('Are you sure you want to delete this record?')) return;

            try {
                const storageRef = ref(storage, filePath);
                await deleteObject(storageRef);
                await deleteDoc(doc(db, 'medicalRecords', recordId));
                loadRecords();
            } catch (error) {
                console.error('Error deleting record:', error);
                alert('Error deleting record');
            }
        }

        function triggerFileUpload() {
            document.getElementById('fileInput').click();
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        loadRecords();
        window.uploadFile = uploadFile;
        window.deleteRecord = deleteRecord;
        window.triggerFileUpload = triggerFileUpload;
        window.logout = logout;
    </script>
    <!-- VILGAX AI Assistant - Advanced Version -->
    <script src="js/vilgax-assistant-advanced.js"></script>
    <!-- VILGAX Form Filling Engine -->
    <script src="js/vilgax-form-filler.js"></script>
    <!-- VILGAX Hotword Detection -->
    <script src="js/vilgax-hotword-detector.js"></script>
</body>
</html>
